---
$merge:
  - $if: "'coverageIngestionTaskGroupId' in payload"
    then:
      taskGroupId: {$eval: payload.coverageIngestionTaskGroupId}
    else: {}
  - created: {$fromNow: 0 seconds}
    deadline: {$fromNow: 4 hours}
    expires: {$fromNow: 1 month}
    provisionerId: code-coverage
    workerType: bot
    metadata:
      description: ''
      name:
        $if: "'taskName' in payload"
        then: {$eval: payload.taskName}
        else: Code Coverage aggregation task - repo (testing)
      owner: release-mgmt-analysis@mozilla.com
      source: https://github.com/mozilla/code-coverage
    payload:
      cache:
        code-coverage-bot-testing: "/cache"
      capabilities: {}
      command:
        - "code-coverage-repo"
        - "--taskcluster-secret"
        - "project/relman/code-coverage/runtime-testing"
        - "--cache-root"
        - "/cache"
        - "--working-dir"
        - "/build"
      env:
        $merge:
          # Triggered by code coverage crontrigger.
          - $if: firedBy == 'triggerHook'
            else: {}
            then:
              $eval: payload
          # Triggered by project.codecoverage.v1.tasks_done pulse message.
          - $if: firedBy == 'pulseMessage'
            else: {}
            then:
              TESTS_TASK_GROUP_ID:
                $eval: payload.status.taskGroupId
      features:
        taskclusterProxy: true
      image:
        type: indexed-image
        namespace: code-analysis.v2.code-coverage.branch.testing
        path: public/code-coverage-bot.tar.zst
      maxRunTime: 14400
    priority: lowest
    retries: 5
    schedulerId: relman
    scopes:
      - secrets:get:project/relman/code-coverage/runtime-testing
      - notify:email:*
      - docker-worker:cache:code-coverage-bot-testing
      - index:insert-task:project.relman.code-coverage.testing.repo.*
