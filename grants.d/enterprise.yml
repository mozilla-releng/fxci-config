## Enterprise Firefox specific roles
- grant:
    - auth:gcp:access-token:sccache-3/ent-sccache-l1*
  to:
    - role:
        - project:taskcluster:enterprise:level-1-sccache-buckets

- grant:
    - auth:gcp:access-token:sccache-3/ent-sccache-l2*
  to:
    - role:
        - project:taskcluster:enterprise:level-2-sccache-buckets

- grant:
    - auth:gcp:access-token:sccache-3/ent-sccache-l3*
  to:
    - role:
        - project:taskcluster:enterprise:level-3-sccache-buckets

- grant:
    # Bug 2002823 - Temporarily grant access to Gecko mac workers to unblock
    # progress until we can get macs for enterprise.
    - queue:create-task:{priority}:releng-hardware/gecko-{level}-b-osx*
  to:
    - project:
        feature: gecko-roles
        trust_domain: [enterprise]

- grant:
    # access to OSX testers
    - queue:create-task:{priority}:releng-hardware/gecko-t-osx-*
  to:
    - project:
        feature: gecko-roles
        trust_domain: enterprise

- grant:
    # Grant some Gecko build secrets to Enterprise Firefox as the values for both
    # will be the same regardless.
    - secrets:get:project/releng/gecko/build/level-{level}/gecko-symbol-upload
    - secrets:get:project/releng/gecko/build/level-{level}/gls-gapi.data
    - secrets:get:project/releng/gecko/build/level-{level}/sb-gapi.data
    - secrets:get:project/releng/gecko/build/level-{level}/mozilla-desktop-geoloc-api.key
  to:
    - project:
        feature: gecko-roles
        trust_domain: [enterprise]

- grant:
    - project:{trust_domain}:releng:signing:cert:dep-signing
    - queue:create-task:{priority}:scriptworker-prov-v1/dep-{trust_domain}-signing-mac14m2
    - queue:create-task:{priority}:releng-hardware/{trust_domain}-{level}-*
    - queue:route:tc-treeherder.v2.enterprise-main.*
    - queue:route:tc-treeherder.v2.enterprise-release.*
  to:
    - project:
        alias: enterprise-firefox

- grant:
    - project:{trust_domain}:releng:signing:cert:release-apple-notarization
    - queue:create-task:{priority}:scriptworker-prov-v1/{trust_domain}-signing-mac14m2
  to:
    - project:
        alias: enterprise-firefox
        job: [branch:*]
        level: 3

- grant:
    - project:{trust_domain}:releng:signing:cert:nightly-signing
  to:
    - project:
        alias: enterprise-firefox
        job: [branch:enterprise-main]

- grant:
    - project:{trust_domain}:releng:signing:cert:release-signing
  to:
    - project:
        alias: enterprise-firefox
        job: [branch:enterprise-release]

# Bug 2013033: project maintenance scopes for enterprise-developers
- grant:
    - hooks:trigger-hook:project-enterprise/in-tree-action-1-generic/*
    - hooks:trigger-hook:project-enterprise/in-tree-pr-action-1-generic/*
    - hooks:trigger-hook:project-enterprise/in-tree-action-3-generic/*
    - secrets:set:project/enterprise/*
    - secrets:get:project/enterprise/*
    - queue:rerun-task:enterprise-level-*
    - queue:cancel-task:enterprise-level-*
  to:
    - roles:
        - mozillians-group:enterprise-developers
