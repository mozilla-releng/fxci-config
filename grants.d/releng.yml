##
# mozilla-releng roles
#

# Grant these for all releng repos on github
- grant:
    - notify:email:*
    - queue:route:garbage.*
    - queue:route:index.garbage.*
    - queue:route:notify.email.*
    - queue:scheduler-id:taskcluster-github
    - queue:create-task:{priority}:{trust_domain}-{level}/*
    - queue:create-task:{priority}:{trust_domain}-t/*
  to:
    - project:
        trust_domain: releng

# - balrog specific roles
- grant:
    - secrets:get:repo:github.com/mozilla-releng/balrog:coveralls
  to:
    - project:
        alias: balrog
        job: [pull-request:*, branch:main]

- grant:
    - queue:route:index.project.balrog.*
    - queue:route:notify.*
    - secrets:get:repo:github.com/mozilla-releng/balrog:dockerhub
  to:
    - project:
        alias: balrog
        job: [branch:main]

- grant:
    - queue:route:index.project.balrog.*
    - secrets:get:repo:github.com/mozilla-releng/balrog:dockerhub
    # S3 creds are for deploying the UI
    - secrets:get:repo:github.com/mozilla-releng/balrog:s3-prod-aws-creds
    - secrets:get:repo:github.com/mozilla-releng/balrog:s3-stage-aws-creds
  to:
    - project:
        alias: balrog
        job: [release:*]

# - shipit specific roles
- grant:
    - secrets:get:project/releng/shipit/deploy
  to:
    - projects:
        alias: shipit
        job: [branch:production, branch:dev]

- grant:
    - secrets:get:project/releng/shipit/ci
  to:
    - project:
        alias: shipit

# - tooltool specific roles
- grant:
    - secrets:get:project/releng/tooltool/ci
  to:
    - projects:
        alias: tooltool
        job: [branch:*, pull-request:*]

- grant:
    - secrets:get:project/releng/tooltool/deploy
  to:
    - projects:
        alias: tooltool
        job: [branch:dev, branch:staging, branch:production]

# - product-details specific roles
- grant:
    - secrets:get:repo:github.com/mozilla-releng/product-details:branch:production
  to:
    - projects:
        alias: product-details
        job: [branch:production]

- grant:
    - secrets:get:repo:github.com/mozilla-releng/product-details:branch:staging
  to:
    - projects:
        alias: product-details
        job: [branch:staging]

- grant:
    - secrets:get:repo:github.com/mozilla-releng/product-details:branch:testing
  to:
    - projects:
        alias: product-details
        job: [branch:testing]

# - k8s-autoscale roles
- grant:
    - secrets:get:project/releng/k8s-autoscale/deploy
  to:
    - project:
        alias: k8s-autoscale
        job: [branch:dev, branch:main, branch:production]

# Cross trust-domain os-integration test scopes.
# These scopes are necessary to run tests from other trust domains on repos where
# we manage Taskcluster configuration, like fxci-config and worker-images. These
# tests help us ensure we don't break downstream tasks before changing the pools
# they run on.
#
# Running tasks on other trust domain's pools is not a good practice, so make
# sure we're only granting level 1 pools and other non-sensitive scopes here.
- grant:
    # There's a task in the staging instance that runs on fxci-config pull requests
    # which applies the config directly from a pull request. This task resets the
    # project/releng/fxci-config/apply access token each time to get the necessary
    # credentials.
    - auth:reset-access-token:project/releng/fxci-config/apply
    # This is used to fetch private artifacts from the fxci instance.
    - secrets:get:project/releng/fxci-config/firefoxci-artifact-client
    # This is only used to authenticate as the taskcluster-staging app to avoid
    # Github rate limits.
    - secrets:get:project/releng/tc-github-private-key
  to:
    - project:
        alias: fxci-config
        job: [pull-request:trusted]
  environments: staging

- grant: &os-integration
    # We grant ability to create `gecko-t` tasks in the staging instance so we
    # can validate image changes before they land.
    - queue:create-task:low:gecko-t/*
    # Other misc scopes needed to run integration test tasks
    - docker-worker:feature:allowPtrace
    - docker-worker:capability:device:loopbackVideo
    - docker-worker:capability:device:kvm
    - project:releng:services/tooltool/api/download/public
    - project:releng:services/tooltool/api/download/internal
    - queue:get-artifact:project/gecko/android-emulator/*
    - queue:get-artifact:project/gecko/android-system-images/*
    # Similarly, we grant enough scopes to be able to run translations training actions
    - assume:repo:github.com/mozilla/translations:action:train
    - queue:create-task:low:translations-1/decision-gcp
  to:
    - project:
        alias: fxci-config
        job: [pull-request:trusted]
  environments: staging

- grant: *os-integration
  to:
    - project:
        alias: worker-images
        job: [cron:run-integration-tests]

