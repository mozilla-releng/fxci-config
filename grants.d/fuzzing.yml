# Fuzzing project grants (migrated from community-tc-config)
# NOTE: Grants for specific hook-id:project-fuzzing/<hookId> roles are NOT
# needed here because hooks.yml defines the scopes for each hook role directly.
# Only grants for non-hook roles (repos, project-admin, wildcard hook-id, etc.)
# are included below.

- grant:
    - queue:scheduler-id:fuzzing
  to:
    - roles:
        - hook-id:project-fuzzing/*
        - repo:github.com/MozillaSecurity/*

- grant:
    - queue:create-task:highest:proj-fuzzing/ci
    - queue:create-task:highest:proj-fuzzing/ci-*
    - queue:create-task:highest:proj-fuzzing/decision
    - queue:route:checks
    - secrets:get:project/fuzzing/deploy-*
    - secrets:get:project/fuzzing/codecov-*
    - secrets:get:project/fuzzing/pypi-*
    - secrets:get:project/fuzzing/ci-*
  to:
    - roles:
        - repo:github.com/MozillaSecurity/*

- grant:
    - secrets:get:project/fuzzing/decision
  to:
    - roles:
        - repo:github.com/MozillaSecurity/fuzzing-tc-config:*

- grant:
    - assume:hook-id:project-fuzzing/linux-pool*
    - assume:hook-id:project-fuzzing/macos-pool*
    - assume:hook-id:project-fuzzing/windows-pool*
    - auth:create-role:hook-id:project-fuzzing/*
    - auth:update-role:hook-id:project-fuzzing/*
    - auth:delete-role:hook-id:project-fuzzing/*
    - docker-worker:capability:device:hostSharedMemory
    - docker-worker:capability:device:kvm
    - docker-worker:capability:device:loopbackAudio
    - docker-worker:capability:privileged
    - generic-worker:capability:device:hostSharedMemory
    - generic-worker:capability:device:loopbackAudio
    - generic-worker:capability:privileged
    - generic-worker:os-group:proj-fuzzing/*
    - generic-worker:run-as-administrator:proj-fuzzing/*
    - hooks:modify-hook:project-fuzzing/*
    - hooks:trigger-hook:project-fuzzing/*
    - queue:create-task:highest:proj-fuzzing/*
    - queue:scheduler-id:fuzzing
    - queue:cancel-task:fuzzing/*
    - queue:route:notify.*
    - secrets:get:project/fuzzing/*
    - worker-manager:manage-worker-pool:proj-fuzzing/*
    - worker-manager:provider:aws
    - worker-manager:provider:azure2
    - worker-manager:provider:fxci-level1-gcp
  to:
    - roles:
        - repo:github.com/MozillaSecurity/fuzzing-tc-config:branch:master

- grant:
    - secrets:get:project/fuzzing/ansible-vault-key
    - secrets:get:project/fuzzing/ssh-fm-staging-automation-user
  to:
    - roles:
        - repo:github.com/MozillaSecurity/fuzzmanager-config:*

- grant:
    - queue:get-artifact:project/fuzzing/private/logs/*
  to:
    - roles:
        - login-identity:github/173702880|moz-mdauer

- grant:
    - docker-worker:capability:privileged
    - index:insert-task:project.fuzzing.orion.*
    - queue:route:index.project.fuzzing.orion.*
    - secrets:get:project/fuzzing/docker-hub
  to:
    - roles:
        - repo:github.com/MozillaSecurity/orion:*

- grant:
    - docker-worker:capability:privileged
  to:
    - roles:
        - repo:github.com/MozillaSecurity/FuzzManager:*

- grant:
    - secrets:get:project/fuzzing/docker-hub
  to:
    - roles:
        - repo:github.com/MozillaSecurity/FuzzManager:branch:master

- grant:
    - generic-worker:allow-rdp:proj-fuzzing/*
    - queue:cancel-task:fuzzing/*
    - queue:cancel-task-group:fuzzing/*
    - queue:seal-task-group:fuzzing/*
    # Self-serve administration of the fuzzing team's MozillaSecurity repo roles
    # (they run their own tc-admin from e.g. fuzzing-tc-config).
    - assume:repo-admin:github.com/MozillaSecurity/*
    # Manage tasks created by the GitHub integration and the Taskcluster UI
    # (e.g. interactive tasks) for the fuzzing project. Mirrors the
    # project-admin:fuzzing capabilities that existed on community-tc.
    # (community-tc's notify:irc-* and the legacy "-" scheduler are omitted:
    # firefox-ci has no IRC and does not use the "-" scheduler-id.)
    - queue:cancel-task:taskcluster-github/*
    - queue:cancel-task:taskcluster-ui/*
    - queue:rerun-task:taskcluster-github/*
    - queue:rerun-task:taskcluster-ui/*
    - queue:schedule-task:taskcluster-github/*
    - queue:schedule-task:taskcluster-ui/*
    - queue:scheduler-id:taskcluster-github
    # Fetch artifacts from interactive docker-worker / generic-worker tasks
    - queue:get-artifact:private/docker-worker/*
    - queue:get-artifact:private/generic-worker/*
    # Send build / automation notifications
    - notify:email:*
    - worker-manager:create-worker:proj-fuzzing/*
    - worker-manager:manage-worker-pool:proj-fuzzing*
    - worker-manager:provider:aws
    - worker-manager:provider:azure2
    - worker-manager:provider:fxci-level1-gcp
    - worker-manager:provider:null-provider
    - worker-manager:remove-worker:proj-fuzzing/*
  to:
    - roles:
        - project-admin:fuzzing

- grant:
    - assume:project-admin:fuzzing
  to:
    - roles:
        - github-team:MozillaSecurity/tc-admin

# Worker pool roles for fuzzing pools (matches community-tc behavior)
- grant:
    - auth:sentry:generic-worker
  to:
    - roles:
        - worker-pool:proj-fuzzing/*
