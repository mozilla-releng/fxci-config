---
# Resources matching these patterns are externally managed and should NOT be
# deleted by tc-admin even if they are not generated by this repository.
#
# This is needed for projects like fuzzing where a separate repo
# (fuzzing-tc-config) deploys additional hooks, worker pools, and roles
# into the same namespace that this repo also partially manages.
#
# Each entry is a regex pattern matching tc-admin resource IDs.
# Format: Kind=identifier (e.g., WorkerPool=proj-fuzzing/.*, Hook=project-fuzzing/.*)

fuzzing:
  # fuzzing-tc-config deploys additional hooks and pools into the proj-fuzzing
  # and project-fuzzing namespaces. We must not delete those resources.
  - "Role=project:fuzzing:.*"
  - "Client=project/fuzzing/.*"
  - "WorkerPool=proj-fuzzing/.*"
  - "Secret=worker-pool:proj-fuzzing/.*"
  - "Hook=project-fuzzing/.*"
  - "Role=hook-id:project-fuzzing/.*"
  - "Secret=project/fuzzing/.*"
