---
name: deploy
on:  # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}
  workflow_call:
    inputs:
      trigger_reason:
        description: "Human-readable note describing what triggered this deploy."
        type: string
        required: false
        default: ""

permissions:
  contents: read

# Serialize every deploy into a single group so only one ever runs at a time.
# A trigger arriving mid-deploy queues one pending run rather than starting a
# concurrent apply. cancel-in-progress is false so an in-flight apply is never
# interrupted.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: ["staging", "firefoxci"]
    env:
      TASKCLUSTER_ROOT_URL: ${{vars.TASKCLUSTER_ROOT_URL}}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GCP_CHECK_TOKEN: ${{ secrets.GCP_CHECK_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Set root url
        run: |
          if [ "${{ matrix.environment }}" == "staging" ]; then
            echo "TASKCLUSTER_ROOT_URL=https://stage.taskcluster.nonprod.webservices.mozgcp.net" >> $GITHUB_ENV;
          elif [ "${{ matrix.environment }}" == "firefoxci" ]; then
            echo "TASKCLUSTER_ROOT_URL=https://firefox-ci-tc.services.mozilla.com" >> $GITHUB_ENV;
          fi
      - name: Run checks
        run: uv run tc-admin check --environment ${{matrix.environment}}

  apply:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    needs: check
    environment: apply-${{matrix.environment}}
    strategy:
      matrix:
        environment: ["firefoxci"]
    env:
      TASKCLUSTER_ROOT_URL: ${{vars.TASKCLUSTER_ROOT_URL}}
      TASKCLUSTER_CLIENT_ID: ${{vars.TASKCLUSTER_CLIENT_ID}}
      TASKCLUSTER_ACCESS_TOKEN: ${{secrets.TASKCLUSTER_ACCESS_TOKEN}}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.14'
      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      - name: Deploy environment
        id: apply_config
        run: uv run tc-admin apply --environment ${{matrix.environment}}

  notify:
    if: always() && (github.event_name == 'push' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    runs-on: ubuntu-latest
    needs: [check, apply]
    steps:
      - name: Notify Slack
        if: always()
        env:
          # All dynamic values arrive as env vars, never interpolated into the
          # script body -- so nothing (notably TRIGGER_REASON) can inject shell.
          TRIGGER_REASON: ${{ inputs.trigger_reason }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          CHECK_RESULT: ${{ needs.check.result }}
          APPLY_RESULT: ${{ needs.apply.result }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          set -euo pipefail

          if [ "$CHECK_RESULT" = "success" ]; then
            CHECK_LINE=":white_check_mark: check succeeded"
          else
            CHECK_LINE=":x: check failed"
          fi

          if [ "$APPLY_RESULT" = "success" ]; then
            APPLY_LINE=":white_check_mark: apply succeeded"
          else
            APPLY_LINE=":x: apply failed"
          fi

          SHORT_SHA=$(echo "$SHA" | cut -c1-7)
          RESOLVED_TEXT="Deploy of <https://github.com/${REPO}|${REPO}> from <https://github.com/${REPO}/commit/${SHA}|${SHORT_SHA}> is resolved"
          LINK_TEXT="<https://github.com/${REPO}/actions/runs/${RUN_ID}|View Workflow>"

          # Build the payload with jq so every value is JSON-escaped; the status
          # lines (and optional reason) are joined with newlines inside jq.
          SLACK_MESSAGE=$(jq -n \
            --arg resolved "$RESOLVED_TEXT" \
            --arg check "$CHECK_LINE" \
            --arg apply "$APPLY_LINE" \
            --arg reason "$TRIGGER_REASON" \
            --arg link "$LINK_TEXT" \
            '($check + "\n" + $apply + (if $reason != "" then "\n" + $reason else "" end)) as $status
             | {blocks: [
                 {type: "section", text: {type: "mrkdwn", text: $resolved}},
                 {type: "divider"},
                 {type: "section", text: {type: "mrkdwn", text: $status}},
                 {type: "section", text: {type: "mrkdwn", text: $link}}
               ]}')

          curl -X POST -H 'Content-type: application/json' \
            --data "$SLACK_MESSAGE" "$SLACK_WEBHOOK_URL" \
            || echo "::warning::Slack notification POST failed"
