---
defaults:
  owner: release+tc-workers@mozilla.com
  email_on_error: true
  description: Worker for Firefox automation.
  implementation: docker-worker
  regions:
  - us-central1
  - us-west1
  min_cpu_platform: Intel Cascadelake
  lifecycle:
    registrationTimeout: 1800
    reregistrationTimeout: 345600
    queueInactivityTimeout: 7200
  scaling_ratio: 1
templates:
  gcp-gw-linux:
    worker_config:
      genericWorker:
        config:
          cleanUpTaskDirs: true
          disableReboots: false
          ed25519SigningKeyLocation: /etc/taskcluster/secrets/gw_cot_private_key
          idleTimeoutSecs: 300
          livelogExecutable: /usr/local/bin/livelog
          numberOfTasksToRun: 0
          sentryProject: generic-worker
          shutdownMachineOnIdle: true
          shutdownMachineOnInternalError: true
          taskclusterProxyExecutable: /usr/local/bin/taskcluster-proxy
          taskclusterProxyPort: 80
          wstAudience: firefoxcitc
  azure-win2022:
    worker_config:
      genericWorker:
        config:
          cachesDir: D:\caches
          cleanUpTaskDirs: true
          disableReboots: false
          downloadsDir: D:\downloads
          ed25519SigningKeyLocation: C:\generic-worker\ed25519-private.key
          idleTimeoutSecs: 150
          livelogExecutable: C:\generic-worker\livelog.exe
          numberOfTasksToRun: 0
          runAfterUserCreation: C:\generic-worker\task-user-init.cmd
          runTasksAsCurrentUser: false
          sentryProject: generic-worker
          shutdownMachineOnIdle: true
          shutdownMachineOnInternalError: true
          taskclusterProxyExecutable: C:\generic-worker\taskcluster-proxy.exe
          taskclusterProxyPort: 80
          tasksDir: D:\
          wstAudience: firefoxcitc
    os_profile:
      windowsConfiguration:
        enableAutomaticUpdates: false
        timeZone: UTC
    diagnostics_profile:
      bootDiagnostics:
        enabled: false
    os_disk:
      caching: ReadOnly
      createOption: FromImage
      diffDiskSettings:
        option: Local
      osType: Windows
    tags:
      sourceBranch: windows
      sourceOrganisation: mozilla-platform-ops
      sourceRepository: ronin_puppet
      sourceScript: provisioners/windows/azure/2022-azure-bootstrap.ps1
  gcp-gw-translations:
    worker_config:
      genericWorker:
        config:
          cleanUpTaskDirs: true
          containerEngine: docker
          disableReboots: false
          ed25519SigningKeyLocation: /etc/generic-worker/ed25519_key
          enableD2G: true
          enableInteractive: true
          idleTimeoutSecs: 300
          livelogExecutable: /usr/local/bin/livelog
          maxTaskRunTime: 2592000
          numberOfTasksToRun: 0
          sentryProject: generic-worker
          shutdownMachineOnIdle: true
          shutdownMachineOnInternalError: true
          taskclusterProxyExecutable: /usr/local/bin/taskcluster-proxy
          taskclusterProxyPort: 80
          wstAudience: firefoxcitc
  azure-win2012:
    worker_config:
      genericWorker:
        config:
          cachesDir: Z:\caches
          cleanUpTaskDirs: true
          disableReboots: false
          downloadsDir: Z:\downloads
          ed25519SigningKeyLocation: C:\generic-worker\ed25519-private.key
          idleTimeoutSecs: 1800
          livelogExecutable: C:\generic-worker\livelog.exe
          numberOfTasksToRun: 0
          runAfterUserCreation: C:\generic-worker\task-user-init.cmd
          runTasksAsCurrentUser: false
          sentryProject: generic-worker
          shutdownMachineOnIdle: true
          shutdownMachineOnInternalError: true
          taskclusterProxyExecutable: C:\generic-worker\taskcluster-proxy.exe
          taskclusterProxyPort: 80
          tasksDir: Z:\
          wstAudience: firefoxcitc
    os_profile:
      windowsConfiguration:
        enableAutomaticUpdates: false
        timeZone: UTC
    diagnostics_profile:
      bootDiagnostics:
        enabled: false
    data_disks:
    - createOption: Empty
      diskSizeGB: 120
      lun: 0
      managedDisk:
        storageAccountType: Premium_LRS
    os_disk:
      createOption: FromImage
      osType: Windows
    tags:
      sourceBranch: cloud_windows
      sourceOrganisation: mozilla-platform-ops
      sourceRepository: ronin_puppet
      sourceScript: provisioners/windows/azure/azure-bootstrap.ps1
  dw-custom:
    worker_config:
      shutdown:
        afterIdleSeconds: 600
        enabled: true
  gcp-gw-translations-2:
    worker_config:
      genericWorker:
        config:
          cachesDir: /home/ubuntu/caches
          cleanUpTaskDirs: true
          disableReboots: false
          downloadsDir: /home/ubuntu/downloads
          ed25519SigningKeyLocation: /home/ubuntu/generic_worker/ed25519-private.key
          enableInteractive: true
          idleTimeoutSecs: 300
          livelogExecutable: /home/ubuntu/generic_worker/livelog
          maxTaskRunTime: 2592000
          numberOfTasksToRun: 0
          sentryProject: generic-worker
          shutdownMachineOnIdle: true
          shutdownMachineOnInternalError: true
          taskclusterProxyExecutable: /home/ubuntu/generic_worker/taskcluster-proxy
          taskclusterProxyPort: 8081
          tasksDir: /home/ubuntu/tasks
          wstAudience: firefoxcitc
  gcp-gw-headless:
    worker_config:
      genericWorker:
        config:
          cleanUpTaskDirs: true
          disableReboots: false
          ed25519SigningKeyLocation: /etc/generic-worker/ed25519_key
          enableD2G: true
          enableInteractive: true
          idleTimeoutSecs: 300
          livelogExecutable: /usr/local/bin/livelog
          numberOfTasksToRun: 0
          sentryProject: generic-worker
          shutdownMachineOnIdle: true
          shutdownMachineOnInternalError: true
          taskclusterProxyExecutable: /usr/local/bin/taskcluster-proxy
          taskclusterProxyPort: 80
          wstAudience: firefoxcitc
  gcp-gw-wayland:
    worker_config:
      genericWorker:
        config:
          cleanUpTaskDirs: true
          disableReboots: false
          ed25519SigningKeyLocation: /etc/taskcluster/secrets/gw_cot_private_key
          enableInteractive: true
          idleTimeoutSecs: 300
          livelogExecutable: /usr/local/bin/livelog
          numberOfTasksToRun: 0
          sentryProject: generic-worker
          shutdownMachineOnIdle: true
          shutdownMachineOnInternalError: true
          taskclusterProxyExecutable: /usr/local/bin/taskcluster-proxy
          taskclusterProxyPort: 80
          wstAudience: firefoxcitc
  dw-docker-config:
    worker_config:
      deviceManagement:
        hostSharedMemory:
          enabled: false
        kvm:
          enabled: true
      dockerConfig:
        allowPrivileged: true
  dw-docker-config-2:
    worker_config:
      deviceManagement:
        hostSharedMemory:
          enabled: false
        kvm:
          enabled: true
      dockerConfig:
        allowPrivileged: false
  azure-win11-arm64:
    worker_config:
      genericWorker:
        config:
          cachesDir: C:\caches
          cleanUpTaskDirs: true
          disableReboots: false
          downloadsDir: C:\downloads
          ed25519SigningKeyLocation: C:\generic-worker\ed25519-private.key
          idleTimeoutSecs: 150
          livelogExecutable: C:\generic-worker\livelog.exe
          numberOfTasksToRun: 0
          provisionerId: gecko-1
          runAfterUserCreation: C:\generic-worker\task-user-init.cmd
          runTasksAsCurrentUser: false
          sentryProject: generic-worker
          shutdownMachineOnIdle: true
          shutdownMachineOnInternalError: true
          taskclusterProxyExecutable: C:\generic-worker\taskcluster-proxy.exe
          taskclusterProxyPort: 80
          tasksDir: C:\
          workerType: win11-a64-24h2-builder-alpha
          wstAudience: firefoxcitc
    os_profile:
      windowsConfiguration:
        enableAutomaticUpdates: false
        timeZone: UTC
    diagnostics_profile:
      bootDiagnostics:
        enabled: false
    os_disk:
      createOption: FromImage
      managedDisk:
        storageAccountType: Premium_LRS
      osType: Windows
    tags:
      sourceBranch: win11Aarch64
      sourceOrganisation: mozilla-platform-ops
      sourceRepository: ronin_puppet
      sourceScript: provisioners/windows/azure/azure-bootstrap.ps1
  dw-custom-2:
    worker_config:
      shutdown:
        afterIdleSeconds: 900
        enabled: true
  gcp-gw-wayland-2:
    worker_config:
      genericWorker:
        config:
          cachesDir: /home/ubuntu/caches
          cleanUpTaskDirs: true
          disableReboots: false
          downloadsDir: /home/ubuntu/downloads
          ed25519SigningKeyLocation: /home/ubuntu/generic_worker/ed25519-private.key
          idleTimeoutSecs: 5400
          livelogExecutable: /home/ubuntu/.taskcluster/livelog
          numberOfTasksToRun: 1
          sentryProject: generic-worker
          shutdownMachineOnIdle: true
          shutdownMachineOnInternalError: true
          taskclusterProxyExecutable: /home/ubuntu/.taskcluster/taskcluster-proxy
          taskclusterProxyPort: 8081
          tasksDir: /home/ubuntu/tasks
          wstAudience: firefoxcitc
