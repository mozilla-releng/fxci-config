---
meta:
  github-trigger-schema-properties: &github-trigger-schema-properties
    event:
      type: object
      additionalProperties: true
    now:
      type: string
    taskcluster_root_url:
      type: string
    tasks_for:
      type: string
    taskId:
      type: string
    context:
      type: object
      additionalProperties: true

project-relman/code-coverage-repo-{mode}:
  variants:
    - mode: production
      priority: highest
    - mode: testing
      priority: lowest
  name: Code coverage hook ({mode})
  description: Automatically build code coverage reports
  owner: release-mgmt-analysis@mozilla.com
  email_on_error: true
  scopes:
    - assume:project:taskcluster:mozilla-github-repository
    - docker-worker:cache:code-coverage-bot-{mode}
    - index:insert-task:project.releng.services.project.{mode}.code_coverage_bot.*
    - index:insert-task:project.relman.code-coverage.{mode}.repo.*
    - notify:email:*
    - queue:create-task:{priority}:code-coverage/bot
    - queue:route:notify.email.*
    - queue:scheduler-id:relman
    - secrets:get:project/relman/code-coverage/runtime-{mode}
  template_file: hook-templates/project-relman/code-coverage-repo-{mode}.yml
  bindings:
    - exchange: exchange/taskcluster-queue/v1/task-completed
      routing_key_pattern: route.project.codecoverage.v1.tasks_done
  trigger_schema:
    type: object
    additionalProperties: true

project-relman/code-coverage-cron-{mode}:
  variants:
    - mode: production
      priority: highest
    - mode: testing
      priority: lowest
  name: Code coverage hook ({mode})
  description: Automatically build code coverage reports
  owner: release-mgmt-analysis@mozilla.com
  email_on_error: true
  schedule:
    - 0 0 12 * * *
  scopes:
    - assume:project:taskcluster:mozilla-github-repository
    - docker-worker:cache:code-coverage-bot-{mode}
    - index:insert-task:project.relman.code-coverage.{mode}.cron.*
    - notify:email:*
    - queue:create-task:{priority}:code-coverage/bot
    - queue:route:notify.email.*
    - queue:scheduler-id:relman
    - secrets:get:project/relman/code-coverage/runtime-{mode}
  template_file: hook-templates/project-relman/code-coverage-cron-{mode}.yml
  trigger_schema:
    type: object
    additionalProperties: true

project-relman/code-coverage-crontrigger-{mode}:
  variants:
    - mode: production
      priority: highest
    - mode: testing
      priority: lowest
  name: Code coverage hook ({mode})
  description: Automatically trigger code coverage ingestion hook
  owner: release-mgmt-analysis@mozilla.com
  email_on_error: true
  schedule:
    - 0 0 */3 * * *
  scopes:
    - hooks:trigger-hook:project-relman/code-coverage-repo-{mode}
    - assume:project:taskcluster:mozilla-github-repository
    - index:insert-task:project.relman.code-coverage.{mode}.crontrigger.*
    - notify:email:*
    - queue:create-task:{priority}:code-coverage/bot
    - queue:route:notify.email.*
    - queue:scheduler-id:relman
    - secrets:get:project/relman/code-coverage/runtime-{mode}
  template_file: hook-templates/project-relman/code-coverage-crontrigger-{mode}.yml
  trigger_schema:
    type: object
    additionalProperties: true

project-relman/code-review-{mode}:
  variants:
    - mode: production
      priority: highest
    - mode: testing
      priority: lowest
  name: Code review hook ({mode})
  description: Automatically create code review publication tasks
  owner: release-mgmt-analysis@mozilla.com
  email_on_error: true
  scopes:
    - assume:project:taskcluster:mozilla-github-repository
    - hooks:trigger-hook:project-releng/services-{mode}-*
    - index:insert-task:project.relman.{mode}.code-review.*
    - notify:email:*
    - queue:create-task:{priority}:code-review/bot
    - queue:route:index.project.releng.services.project.{mode}.static_analysis_bot.*
    - queue:route:index.project.relman.{mode}.code-review.*
    - queue:route:notify.email.*
    - queue:scheduler-id:relman
    - secrets:get:project/relman/code-review/runtime-{mode}
    - docker-worker:cache:code-review-{mode}-checkout
  template_file: hook-templates/project-relman/code-review-{mode}.yml
  bindings:
    - exchange: exchange/taskcluster-queue/v1/task-completed
      routing_key_pattern: route.project.relman.codereview.v1.try_ending
    - exchange: exchange/taskcluster-queue/v1/task-group-resolved
      routing_key_pattern: '#.gecko-level-3.#'
  trigger_schema:
    type: object
    additionalProperties: true
    properties:

      # Trigger hook from Phabricator with token payload to create a try push
      build_target_phid:
        type: string
        description: Phabricator Build target's PHID triggering the hook

      # Trigger hook from pulse for analyzing results
      runId:
        type: integer
        description: Taskcluster Task Run ID triggering the hook (should be a Try Task run)
      status:
        type: object
        required:
          - taskId
          - taskGroupId
        properties:
          taskId:
            type: string
            description: Taskcluster Task ID triggering the hook (should be a Try Task)
          taskGroupId:
            type: string
            description: Taskcluster Task Group ID triggering the hook (should be a Try Task Group)

lint/pre-commit-{version}:
  variants:
    - version: v1
  name: pre-commit ({version})
  description: Run pre-commit checks
  owner: release+hooks@mozilla.com
  email_on_error: true
  scopes:
    - generic-worker:cache:lint-pre-commit-*
    - queue:create-task:low:mozilla-t/pre-commit
    # Work around https://github.com/taskcluster/taskcluster/issues/8625
    - queue:get-artifact:public/*
    - queue:route:checks
    - queue:scheduler-id:lint
  template_file: hook-templates/project-releng/pre-commit.yml
  trigger_schema:
    type: object
    additionalProperties: false
    properties:
      <<: *github-trigger-schema-properties
      context:
        type: object
        additionalProperties: false
        properties:
          pre-commit-version:
            type: string
            description: Version of pre-commit to install (e.g. "4.0.0"). Defaults to latest.

#
# EngWF Reviewer Selection
#

project-engwf/reviewer-assignment-staging:
  name: Reviewer assignment hook (staging)
  description: Automatically assign reviewers to PRs
  owner: omehani@mozilla.com
  email_on_error: true
  scopes:
    - index:insert-task:project.engwf.staging.reviewer-assignment.*
    - queue:create-task:lowest:code-review/bot  # XXX: will need to change when a dedicated worker is setup (bug 2024115)
    - queue:route:index.project.engwf.staging.reviewer-assignment.*
    - queue:scheduler-id:engwf
    - secrets:get:project/engwf/reviewer-assignment/runtime-staging
  template_file: hook-templates/project-engwf/reviewer-assignment-staging.yml
  bindings:
    - exchange: exchange/taskcluster-github/v1/pull-request
      routing_key_pattern: '#.infra-testing.#'  # e.g., primary.mozilla-firefox.infra-testing.opened or primary.mozilla-firefox.infra-testing.synchronize
  trigger_schema:
    type: object
    # https://github.com/taskcluster/taskcluster/blob/main/services/github/schemas/v1/github-pull-request-message.yml
    required:
      - body
      - organization
      - repository
    additionalProperties: true
    properties:

      body:
        type: object
        # https://docs.github.com/en/webhooks/webhook-events-and-payloads#pull_request
        description: |
          The raw body of github event (for version 1)
        required:
          - action
          - number
          - pull_request
          - repository
        additionalProperties: true
        properties:

          action:
            type: string
            description: Action on the PR
            pattern: "^(opened|reopened|synchronize)$"

          number:
            type: integer

          pull_request:
            type: object
            description: Pull request metadata
            required:
              - base
              - diff_url
              - head
              - html_url
            additionalProperties: true
            properties:

              base:
                type: object
                required:
                  - ref
                additionalProperties: true
                properties:

                  ref:
                    type: string
                    description: Target branch to merge this PR in

              diff_url:
                # Note: while binary data is not present in that diff, the paths of the binary files are.
                type: string

              head:
                type: object
                required:
                  - sha
                additionalProperties: true
                properties:

                  sha:
                    type: string

              html_url:
                type: string


          repository:
            type: object
            required:
              - html_url
            additionalProperties: true
            properties:

              html_url:
                type: string

      organization:
        type: string
        pattern: "^mozilla-firefox$"

      repository:
        type: string
        pattern: "^infra-testing$"

project-engwf/reviewer-assignment-production:
  name: Reviewer assignment hook (production)
  description: Automatically assign reviewers to PRs
  owner: omehani@mozilla.com
  email_on_error: true
  scopes:
    - index:insert-task:project.engwf.production.reviewer-assignment.*
    - queue:create-task:lowest:code-review/bot  # XXX: will need to change when a dedicated worker is setup (bug 2024115)
    - queue:route:index.project.engwf.production.reviewer-assignment.*
    - queue:scheduler-id:engwf
    - secrets:get:project/engwf/reviewer-assignment/runtime-production
  template_file: hook-templates/project-engwf/reviewer-assignment-production.yml
  bindings:
    - exchange: exchange/taskcluster-github/v1/pull-request
      routing_key_pattern: '#.mozilla-firefox.#.opened'  # e.g., primary.mozilla-firefox.firefox.opened or primary.mozilla-firefox.firefox.synchronize
    - exchange: exchange/taskcluster-github/v1/pull-request
      routing_key_pattern: '#.mozilla-firefox.#.reopened'
    - exchange: exchange/taskcluster-github/v1/pull-request
      routing_key_pattern: '#.mozilla-firefox.#.synchronize'  # e.g., primary.mozilla-firefox.firefox.opened or primary.mozilla-firefox.firefox.synchronize
  trigger_schema:
    type: object
    # https://github.com/taskcluster/taskcluster/blob/main/services/github/schemas/v1/github-pull-request-message.yml
    required:
      - body
      - organization
      - repository
    additionalProperties: true
    properties:

      body:
        type: object
        # https://docs.github.com/en/webhooks/webhook-events-and-payloads#pull_request
        description: |
          The raw body of github event (for version 1)
        required:
          - action
          - number
          - repository
        additionalProperties: true
        properties:

          action:
            type: string
            description: Action on the PR
            pattern: "^(opened|reopened|synchronize)$"

          number:
            type: integer

          pull_request:
            type: object
            description: Pull request metadata
            required:
              - base
              - diff_url
              - head
              - html_url
            additionalProperties: true
            properties:

              base:
                type: object
                required:
                  - ref
                additionalProperties: true
                properties:

                  ref:
                    type: string
                    description: Target branch to merge this PR in

              diff_url:
                # Note: while binary data is not present in that diff, the paths of the binary files are.
                type: string

              head:
                type: object
                required:
                  - sha
                additionalProperties: true
                properties:

                  sha:
                    type: string

              html_url:
                type: string


          repository:
            type: object
            required:
              - html_url
            additionalProperties: true
            properties:

              html_url:
                type: string

      organization:
        type: string
        pattern: "^mozilla-firefox$"

      repository:
        type: string
        pattern: "^(firefox)$"

# Fuzzing hooks (migrated from community-tc)
project-fuzzing/bugmon{suffix}:
  variants:
    - kind: monitor
      suffix: ''
      desc: Hook for triggering bugmon monitor tasks
      cron: '0 */8 * * 1-5'
    - kind: confirm
      suffix: -confirm
      desc: Hook for triggering bugmon forced confirmation tasks
      cron: '0 8 * * 6'
  name: 'bugmon{suffix}'
  description: '{desc}'
  owner: jkratzer@mozilla.com
  email_on_error: true
  schedule:
    - '{cron}'
  scopes:
    - docker-worker:capability:device:hostSharedMemory
    - docker-worker:capability:device:loopbackAudio
    - docker-worker:capability:disableSeccomp
    - docker-worker:capability:privileged
    - queue:create-task:highest:proj-fuzzing/bugmon-monitor
    - queue:create-task:highest:proj-fuzzing/bugmon-pernosco
    - queue:create-task:highest:proj-fuzzing/bugmon-processor
    - queue:create-task:highest:proj-fuzzing/bugmon-processor-windows
    - queue:get-artifact:project/fuzzing/bugmon/*
    - queue:route:notify.email.jkratzer@mozilla.com.on-failed
    - queue:scheduler-id:fuzzing
    - secrets:get:project/fuzzing/bz-api-key
    - secrets:get:project/fuzzing/pernosco-group
    - secrets:get:project/fuzzing/pernosco-secret
    - secrets:get:project/fuzzing/pernosco-user
  template_file: hook-templates/project-fuzzing/bugmon{suffix}.yml
  trigger_schema: {}

project-fuzzing/{hook}:
  variants:
    - hook: coverage-revision
      desc: Hook for pinning m-c revision for periodic fuzzing coverage tasks
      cron: '0 0 * * 1'
    - hook: js-tests-distiller
      desc: Hook for distilling JS tests for fuzzing
      cron: '0 0 * * *'
      extra_scopes:
        - secrets:get:project/fuzzing/deploy-langfuzz
  name: '{hook}'
  description: '{desc}'
  owner: fuzzing@mozilla.com
  email_on_error: true
  schedule:
    - '{cron}'
  scopes:
    - queue:create-task:highest:proj-fuzzing/ci
    - queue:route:index.project.fuzzing.{hook}.*
    - queue:route:notify.email.fuzzing@mozilla.com.on-failed
  template_file: hook-templates/project-fuzzing/{hook}.yml
  trigger_schema: {}

project-fuzzing/fuzzing-tc-config-community-update:
  name: fuzzing-tc-config-community-update
  description: Run Fuzzing pool rebuild when Community-TC config changes
  owner: truber@mozilla.com
  email_on_error: true
  bindings:
    - exchange: exchange/taskcluster-github/v1/push
      routing_key_pattern: primary.taskcluster.community-tc-config
  scopes:
    - assume:hook-id:project-fuzzing/linux-pool*
    - assume:hook-id:project-fuzzing/macos-pool*
    - assume:hook-id:project-fuzzing/windows-pool*
    - auth:create-role:hook-id:project-fuzzing/*
    - auth:delete-role:hook-id:project-fuzzing/*
    - auth:update-role:hook-id:project-fuzzing/*
    - docker-worker:capability:device:hostSharedMemory
    - docker-worker:capability:device:kvm
    - docker-worker:capability:device:loopbackAudio
    - docker-worker:capability:privileged
    - generic-worker:capability:device:hostSharedMemory
    - generic-worker:capability:device:loopbackAudio
    - generic-worker:capability:privileged
    - generic-worker:os-group:proj-fuzzing/*
    - generic-worker:run-as-administrator:proj-fuzzing/*
    - hooks:modify-hook:project-fuzzing/*
    - hooks:trigger-hook:project-fuzzing/*
    - queue:cancel-task:fuzzing/*
    - queue:create-task:highest:proj-fuzzing/*
    - queue:route:notify.*
    - queue:scheduler-id:fuzzing
    - secrets:get:project/fuzzing/*
    - worker-manager:manage-worker-pool:proj-fuzzing/*
    - worker-manager:provider:aws
    - worker-manager:provider:azure2
    - worker-manager:provider:fxci-level1-gcp
  template_file: hook-templates/project-fuzzing/fuzzing-tc-config-community-update.yml
  trigger_schema:
    type: object
    properties:
      branch:
        type: string
        default: main
    additionalProperties: true

project-fuzzing/{name}:
  variants:
    - name: gr-css
      grammar: gr.css
      cron: '0 8 * * 6'
      extra_scopes:
        - docker-worker:capability:device:hostSharedMemory
        - docker-worker:capability:device:loopbackAudio
        - secrets:get:project/fuzzing/deploy-gr-css
        - secrets:get:project/fuzzing/deploy-gr-css-generator
        - secrets:get:project/fuzzing/deploy-gr-css-reports
        - secrets:get:project/fuzzing/deploy-octo-private
    - name: gr-idl-update
      grammar: gr.idl
      cron: '0 8 * * 1'
      extra_scopes:
        - secrets:get:project/fuzzing/deploy-gridl
  name: '{name}'
  description: Hook for updating {grammar} grammar
  owner: jkratzer@mozilla.com
  email_on_error: true
  schedule:
    - '{cron}'
  scopes:
    - docker-worker:capability:privileged
    - queue:create-task:highest:proj-fuzzing/ci
    - queue:get-artifact:project/fuzzing/{name}/*
    - queue:route:notify.email.jkratzer@mozilla.com.on-failed
    - queue:scheduler-id:fuzzing
    - secrets:get:project/fuzzing/ci-git-token
    - secrets:get:project/fuzzing/deploy-npm
  template_file: hook-templates/project-fuzzing/{name}.yml
  trigger_schema: {}

project-fuzzing/grizzly-reduce-monitor:
  name: grizzly-reduce-monitor
  description: Hook for triggering Grizzly reduce monitor tasks
  owner: truber@mozilla.com
  email_on_error: true
  schedule:
    - 0 */2 * * *
  scopes:
    - docker-worker:capability:device:hostSharedMemory
    - docker-worker:capability:device:loopbackAudio
    - docker-worker:capability:privileged
    - generic-worker:os-group:proj-fuzzing/grizzly-reduce-worker-windows-ngpu/Administrators
    - generic-worker:os-group:proj-fuzzing/grizzly-reduce-worker-windows/Administrators
    - generic-worker:run-as-administrator:proj-fuzzing/grizzly-reduce-worker-windows
    - generic-worker:run-as-administrator:proj-fuzzing/grizzly-reduce-worker-windows-ngpu
    - queue:create-task:highest:proj-fuzzing/decision
    - queue:create-task:highest:proj-fuzzing/grizzly-reduce-worker*
    - queue:route:notify.email.truber@mozilla.com.on-failed
    - queue:route:notify.email.twsmith@mozilla.com.on-failed
    - secrets:get:project/fuzzing/deploy-bearspray
    - secrets:get:project/fuzzing/deploy-grizzly-private
    - secrets:get:project/fuzzing/fuzzmanagerconf
    - secrets:get:project/fuzzing/google-logging-creds
    - secrets:get:project/fuzzing/grizzly-reduce-tool-list
  template_file: hook-templates/project-fuzzing/grizzly-reduce-monitor.yml
  trigger_schema: {}

project-fuzzing/grizzly-reduce-reset-error:
  name: grizzly-reduce-reset-error
  description: Hook for resetting Grizzly reduce tasks on error
  owner: truber@mozilla.com
  email_on_error: true
  bindings:
    - exchange: exchange/taskcluster-queue/v1/task-exception
      routing_key_pattern: primary.#.grizzly-reduce-worker-android.fuzzing.#
    - exchange: exchange/taskcluster-queue/v1/task-exception
      routing_key_pattern: primary.#.grizzly-reduce-worker-macos.fuzzing.#
    - exchange: exchange/taskcluster-queue/v1/task-exception
      routing_key_pattern: primary.#.grizzly-reduce-worker-windows-ngpu.fuzzing.#
    - exchange: exchange/taskcluster-queue/v1/task-exception
      routing_key_pattern: primary.#.grizzly-reduce-worker-windows.fuzzing.#
    - exchange: exchange/taskcluster-queue/v1/task-exception
      routing_key_pattern: primary.#.grizzly-reduce-worker.fuzzing.#
    - exchange: exchange/taskcluster-queue/v1/task-failed
      routing_key_pattern: primary.#.grizzly-reduce-worker-android.fuzzing.#
    - exchange: exchange/taskcluster-queue/v1/task-failed
      routing_key_pattern: primary.#.grizzly-reduce-worker-macos.fuzzing.#
    - exchange: exchange/taskcluster-queue/v1/task-failed
      routing_key_pattern: primary.#.grizzly-reduce-worker-windows-ngpu.fuzzing.#
    - exchange: exchange/taskcluster-queue/v1/task-failed
      routing_key_pattern: primary.#.grizzly-reduce-worker-windows.fuzzing.#
    - exchange: exchange/taskcluster-queue/v1/task-failed
      routing_key_pattern: primary.#.grizzly-reduce-worker.fuzzing.#
  scopes:
    - queue:create-task:highest:proj-fuzzing/decision
    - queue:route:notify.email.truber@mozilla.com.on-failed
    - queue:route:notify.email.twsmith@mozilla.com.on-failed
    - secrets:get:project/fuzzing/fuzzmanagerconf
  template_file: hook-templates/project-fuzzing/grizzly-reduce-reset-error.yml
  trigger_schema: {}

project-fuzzing/nss-corpus-update:
  name: nss-corpus-update
  description: Hook for updating the NSS fuzzing corpus
  owner: mdauer@mozilla.com
  email_on_error: true
  schedule:
    - 0 0 1,15 * *
  scopes:
    - docker-worker:capability:privileged
    - queue:create-task:highest:proj-fuzzing/nss-corpus-update-worker
    - queue:get-artifact:project/fuzzing/nss-corpus-update/*
    - queue:route:notify.email.jkratzer@mozilla.com.on-failed
    - queue:route:notify.email.mdauer@mozilla.com.on-failed
    - queue:scheduler-id:fuzzing
    - secrets:get:project/fuzzing/deploy-nss-fuzzing-corpus
    - secrets:get:project/fuzzing/ossfuzz-gutils
  template_file: hook-templates/project-fuzzing/nss-corpus-update.yml
  trigger_schema: {}

project-fuzzing/orion-cron:
  name: orion-cron
  description: Periodically check if any Orion services need to be rebuilt
  owner: truber@mozilla.com
  email_on_error: true
  schedule:
    - 0 0 * * 0
  scopes:
    - docker-worker:capability:privileged
    - index:insert-task:project.fuzzing.orion.*
    - queue:create-task:highest:proj-fuzzing/ci
    - queue:create-task:highest:proj-fuzzing/ci-*
    - queue:create-task:highest:proj-fuzzing/decision
    - queue:route:index.project.fuzzing.orion.*
    - secrets:get:project/fuzzing/docker-hub
  template_file: hook-templates/project-fuzzing/orion-cron.yml
  trigger_schema: {}
