---
meta:
  github-trigger-schema-properties: &github-trigger-schema-properties
    event:
      type: object
      additionalProperties: true
    now:
      type: string
    taskcluster_root_url:
      type: string
    tasks_for:
      type: string
    taskId:
      type: string
    context:
      type: object
      additionalProperties: true

project-relman/code-coverage-repo-{mode}:
  variants:
    - mode: production
      priority: highest
    - mode: testing
      priority: lowest
  name: Code coverage hook ({mode})
  description: Automatically build code coverage reports
  owner: release-mgmt-analysis@mozilla.com
  email_on_error: true
  scopes:
    - assume:project:taskcluster:mozilla-github-repository
    - docker-worker:cache:code-coverage-bot-{mode}
    - index:insert-task:project.releng.services.project.{mode}.code_coverage_bot.*
    - index:insert-task:project.relman.code-coverage.{mode}.repo.*
    - notify:email:*
    - queue:create-task:{priority}:code-coverage/bot
    - queue:route:notify.email.*
    - queue:scheduler-id:relman
    - secrets:get:project/relman/code-coverage/runtime-{mode}
  template_file: hook-templates/project-relman/code-coverage-repo-{mode}.yml
  bindings:
    - exchange: exchange/taskcluster-queue/v1/task-completed
      routing_key_pattern: route.project.codecoverage.v1.tasks_done
  trigger_schema:
    type: object
    additionalProperties: true

project-relman/code-coverage-cron-{mode}:
  variants:
    - mode: production
      priority: highest
    - mode: testing
      priority: lowest
  name: Code coverage hook ({mode})
  description: Automatically build code coverage reports
  owner: release-mgmt-analysis@mozilla.com
  email_on_error: true
  schedule:
    - 0 0 12 * * *
  scopes:
    - assume:project:taskcluster:mozilla-github-repository
    - docker-worker:cache:code-coverage-bot-{mode}
    - index:insert-task:project.relman.code-coverage.{mode}.cron.*
    - notify:email:*
    - queue:create-task:{priority}:code-coverage/bot
    - queue:route:notify.email.*
    - queue:scheduler-id:relman
    - secrets:get:project/relman/code-coverage/runtime-{mode}
  template_file: hook-templates/project-relman/code-coverage-cron-{mode}.yml
  trigger_schema:
    type: object
    additionalProperties: true

project-relman/code-coverage-crontrigger-{mode}:
  variants:
    - mode: production
      priority: highest
    - mode: testing
      priority: lowest
  name: Code coverage hook ({mode})
  description: Automatically trigger code coverage ingestion hook
  owner: release-mgmt-analysis@mozilla.com
  email_on_error: true
  schedule:
    - 0 0 */3 * * *
  scopes:
    - hooks:trigger-hook:project-relman/code-coverage-repo-{mode}
    - assume:project:taskcluster:mozilla-github-repository
    - index:insert-task:project.relman.code-coverage.{mode}.crontrigger.*
    - notify:email:*
    - queue:create-task:{priority}:code-coverage/bot
    - queue:route:notify.email.*
    - queue:scheduler-id:relman
    - secrets:get:project/relman/code-coverage/runtime-{mode}
  template_file: hook-templates/project-relman/code-coverage-crontrigger-{mode}.yml
  trigger_schema:
    type: object
    additionalProperties: true

project-relman/code-review-{mode}:
  variants:
    - mode: production
      priority: highest
    - mode: testing
      priority: lowest
  name: Code review hook ({mode})
  description: Automatically create code review publication tasks
  owner: release-mgmt-analysis@mozilla.com
  email_on_error: true
  scopes:
    - assume:project:taskcluster:mozilla-github-repository
    - hooks:trigger-hook:project-releng/services-{mode}-*
    - index:insert-task:project.relman.{mode}.code-review.*
    - notify:email:*
    - queue:create-task:{priority}:code-review/bot
    - queue:route:index.project.releng.services.project.{mode}.static_analysis_bot.*
    - queue:route:index.project.relman.{mode}.code-review.*
    - queue:route:notify.email.*
    - queue:scheduler-id:relman
    - secrets:get:project/relman/code-review/runtime-{mode}
    - docker-worker:cache:code-review-{mode}-checkout
  template_file: hook-templates/project-relman/code-review-{mode}.yml
  bindings:
    - exchange: exchange/taskcluster-queue/v1/task-completed
      routing_key_pattern: route.project.relman.codereview.v1.try_ending
    - exchange: exchange/taskcluster-queue/v1/task-group-resolved
      routing_key_pattern: '#.gecko-level-3.#'
  trigger_schema:
    type: object
    additionalProperties: true
    properties:

      # Trigger hook from Phabricator with token payload to create a try push
      build_target_phid:
        type: string
        description: Phabricator Build target's PHID triggering the hook

      # Trigger hook from pulse for analyzing results
      runId:
        type: integer
        description: Taskcluster Task Run ID triggering the hook (should be a Try Task run)
      status:
        type: object
        required:
          - taskId
          - taskGroupId
        properties:
          taskId:
            type: string
            description: Taskcluster Task ID triggering the hook (should be a Try Task)
          taskGroupId:
            type: string
            description: Taskcluster Task Group ID triggering the hook (should be a Try Task Group)

lint/pre-commit-{version}:
  variants:
    - version: v1
  name: pre-commit ({version})
  description: Run pre-commit checks
  owner: release+hooks@mozilla.com
  email_on_error: true
  scopes:
    - generic-worker:cache:lint-pre-commit-*
    - queue:create-task:low:mozilla-t/pre-commit
    # Work around https://github.com/taskcluster/taskcluster/issues/8625
    - queue:get-artifact:public/*
    - queue:route:checks
    - queue:scheduler-id:lint
  template_file: hook-templates/project-releng/pre-commit.yml
  trigger_schema:
    type: object
    additionalProperties: false
    properties:
      <<: *github-trigger-schema-properties
      context:
        type: object
        additionalProperties: false
        properties:
          pre-commit-version:
            type: string
            description: Version of pre-commit to install (e.g. "4.0.0"). Defaults to latest.

#
# EngWF Reviewer Selection
#

project-engwf/reviewer-assignment-staging:
  name: Reviewer assignment hook (staging)
  description: Automatically assign reviewers to PRs
  owner: omehani@mozilla.com
  email_on_error: true
  scopes:
    - index:insert-task:project.engwf.staging.reviewer-assignment.*
    - queue:create-task:lowest:code-review/bot  # XXX: will need to change when a dedicated worker is setup (bug 2024115)
    - queue:route:index.project.engwf.staging.reviewer-assignment.*
    - queue:scheduler-id:engwf
    - secrets:get:project/engwf/reviewer-assignment/runtime-staging
  template_file: hook-templates/project-engwf/reviewer-assignment-staging.yml
  bindings:
    - exchange: exchange/taskcluster-github/v1/pull-request
      routing_key_pattern: '#.infra-testing.#'  # e.g., primary.mozilla-firefox.infra-testing.opened or primary.mozilla-firefox.infra-testing.synchronize
  trigger_schema:
    type: object
    # https://github.com/taskcluster/taskcluster/blob/main/services/github/schemas/v1/github-pull-request-message.yml
    required:
      - body
      - organization
      - repository
    additionalProperties: true
    properties:

      body:
        type: object
        # https://docs.github.com/en/webhooks/webhook-events-and-payloads#pull_request
        description: |
          The raw body of github event (for version 1)
        required:
          - action
          - number
          - pull_request
          - repository
        additionalProperties: true
        properties:

          action:
            type: string
            description: Action on the PR
            pattern: "^(opened|reopened|synchronize)$"

          number:
            type: integer

          pull_request:
            type: object
            description: Pull request metadata
            required:
              - base
              - diff_url
              - head
              - html_url
            additionalProperties: true
            properties:

              base:
                type: object
                required:
                  - ref
                additionalProperties: true
                properties:

                  ref:
                    type: string
                    description: Target branch to merge this PR in

              diff_url:
                # Note: while binary data is not present in that diff, the paths of the binary files are.
                type: string

              head:
                type: object
                required:
                  - sha
                additionalProperties: true
                properties:

                  sha:
                    type: string

              html_url:
                type: string


          repository:
            type: object
            required:
              - html_url
            additionalProperties: true
            properties:

              html_url:
                type: string

      organization:
        type: string
        pattern: "^mozilla-firefox$"

      repository:
        type: string
        pattern: "^infra-testing$"
