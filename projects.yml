---
# Compressed projects configuration with defaults inheritance.
#
# Merge semantics:
#   defaults: name    -- start with that default's fields
#   extends: name     -- in project-defaults, inherit from another default
#   features+: [...]  -- merge into features from defaults (additive)
#   features: [...]   -- replace features entirely (no merge)
#
# Shorthand formats:
#   branches: ["main@3", "release-*@3"]  -- expands name@level to {name, level}
#   features: [feat-a, feat-b]           -- list of strings means all true
#   features: {feat-a: true, feat-b: {policy: public}}  -- dict for mixed values

project-defaults:
  # --- Mercurial (hg) projects ---
  gecko-hg:
    repo_type: hg
    branches: ["*", default]
    features: [gecko-actions, gecko-roles, hg-push, treeherder-reporting, trust-domain-scopes]

  gecko-hg-cron:
    extends: gecko-hg
    features+: [taskgraph-cron]

  gecko-hg-full:
    extends: gecko-hg-cron
    features+: [lando, merge-automation, shipit]

  # --- Git projects ---
  git-taskgraph-public:
    repo_type: git
    features:
      github-taskgraph: true
      github-pull-request:
        policy: public
      taskgraph-actions: true
      trust-domain-scopes: true

  git-taskgraph-restricted:
    repo_type: git
    features:
      github-taskgraph: true
      github-pull-request:
        policy: public_restricted
      taskgraph-actions: true
      trust-domain-scopes: true

  git-taskgraph-collaborators:
    repo_type: git
    features:
      github-taskgraph: true
      github-pull-request:
        policy: collaborators
      taskgraph-actions: true
      trust-domain-scopes: true

  adhoc-git:
    extends: git-taskgraph-public
    features+: [adhoc-roles]

  # NSS hg repos
  nss-hg:
    repo_type: hg
    branches: [default]
    trust_domain: nss
    features: [hg-push, trust-domain-scopes, treeherder-reporting, taskgraph-actions]

  # firefox-like git repos (gecko trust domain on git)
  firefox-git:
    repo_type: git
    trust_domain: gecko
    features:
      gecko-roles: true
      github-taskgraph: true
      pr-actions: true
      taskgraph-actions: true
      treeherder-reporting: true
      trust-domain-scopes: true

  firefox-git-full:
    extends: firefox-git
    features+:
      github-pull-request:
        policy: collaborators
      scriptworker: true

  # reference-browser / staging-reference-browser
  reference-browser-git:
    repo_type: git
    default_branch: master
    features:
      autophone: true
      github-taskgraph: true
      github-pull-request:
        policy: public_restricted
      mobile-roles: true
      mobile-bump-github: true
      mobile-firebase-testing: true
      mobile-sign-phase: true
      mobile-pushapk-phase: true
      scriptworker: true
      taskgraph-actions: true
      taskgraph-cron: true
      treeherder-reporting: true
      trust-domain-scopes: true

  # firefox-ios / staging-firefox-ios
  firefox-ios-git:
    repo_type: git
    features:
      bitrise: true
      github-taskgraph: true
      github-publication: true
      github-pull-request:
        policy: public_restricted
      merge-automation: true
      mobile-roles: true
      mobile-testrail: true
      shipit: true
      taskgraph-actions: true
      taskgraph-cron: true
      treeherder-reporting: true
      treescript-phase: true
      trust-domain-scopes: true

  # VPN client repos
  vpn-git:
    repo_type: git
    features:
      github-taskgraph: true
      github-pull-request:
        policy: public_restricted
      shipit: true
      taskgraph-actions: true
      treeherder-reporting: true
      trust-domain-scopes: true
      beetmover: true
      beetmover-get-artifact-scope: true

  # XPI manifest repos
  xpi-manifest-git:
    repo_type: git
    features:
      github-pull-request:
        policy: collaborators
      trust-domain-scopes: true
      shipit: true
      xpi-roles: true
      taskgraph-actions: true
      taskgraph-cron: true
      beetmover: true
      beetmover-get-artifact-scope: true

  # application-services / staging
  app-services-git:
    repo_type: git
    features:
      github-taskgraph: true
      github-pull-request:
        policy: public
      scriptworker: true
      shipit: true
      taskgraph-cron: true
      taskgraph-actions: true
      trust-domain-scopes: true
      beetmover: true

  # translations repos
  translations-git:
    repo_type: git
    features:
      github-taskgraph: true
      github-pull-request:
        policy: public
      taskgraph-actions: true
      taskgraph-cron: true
      trust-domain-scopes: true
      treeherder-reporting: true
      pr-actions: true
      beetmover: true

  # code-analysis repos
  code-analysis-git:
    repo_type: git
    features:
      trust-domain-scopes: true
      github-pull-request:
        policy: public

projects:
  # ===== Mercurial hg projects =====

  ash:
    defaults: gecko-hg
    repo: https://hg.mozilla.org/projects/ash
    access: scm_level_2
    trust_domain: comm
    parent_repo: https://hg.mozilla.org/mozilla-central
    features+:
      taskgraph-cron: false

  elm:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/projects/elm
    access: scm_level_2
    trust_domain: gecko

  mozilla-release:
    defaults: gecko-hg-full
    repo: https://hg.mozilla.org/releases/mozilla-release
    lando_repo: firefox-release
    access: scm_level_3
    trust_domain: gecko
    cron:
      targets: [periodic-update]

  comm-release:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/releases/comm-release
    access: scm_level_3
    trust_domain: comm
    parent_repo: https://hg.mozilla.org/releases/mozilla-release
    features+: [shipit]

  mozilla-esr115:
    defaults: gecko-hg-full
    repo: https://hg.mozilla.org/releases/mozilla-esr115
    lando_repo: firefox-esr115
    access: scm_level_3
    trust_domain: gecko
    cron:
      targets: [periodic-update]

  mozilla-esr140:
    defaults: gecko-hg-full
    repo: https://hg.mozilla.org/releases/mozilla-esr140
    lando_repo: firefox-esr140
    access: scm_level_3
    trust_domain: gecko
    cron:
      targets: [periodic-update, pinning-update]

  comm-esr115:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/releases/comm-esr115
    access: scm_level_3
    trust_domain: comm
    parent_repo: https://hg.mozilla.org/releases/mozilla-esr115
    features+: [shipit]

  comm-esr140:
    defaults: gecko-hg
    repo: https://hg.mozilla.org/releases/comm-esr140
    access: scm_level_3
    trust_domain: comm
    parent_repo: https://hg.mozilla.org/releases/mozilla-esr140
    features+:
      taskgraph-cron: false
      shipit: true

  oak:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/projects/oak
    access: scm_level_2
    trust_domain: gecko
    cron:
      targets: [nightly-android]

  pine:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/projects/pine
    access: scm_level_3
    trust_domain: gecko
    cron:
      targets: [nightly-desktop, nightly-desktop-linux, nightly-desktop-osx,
                nightly-desktop-win32, nightly-desktop-win64, nightly-desktop-win64-aarch64]

  toolchains:
    defaults: gecko-hg
    repo: https://hg.mozilla.org/projects/toolchains
    access: scm_level_2
    trust_domain: gecko
    features+:
      taskgraph-cron: false

  mozilla-beta:
    defaults: gecko-hg-full
    repo: https://hg.mozilla.org/releases/mozilla-beta
    lando_repo: firefox-beta
    access: scm_level_3
    trust_domain: gecko
    cron:
      targets: [android-l10n-sync, l10n-bumper, daily-releases, periodic-update, pinning-update]

  comm-beta:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/releases/comm-beta
    access: scm_level_3
    trust_domain: comm
    parent_repo: https://hg.mozilla.org/releases/mozilla-beta
    features+: [shipit]
    cron:
      targets: [l10n-bumper]

  mozilla-central:
    defaults: gecko-hg-full
    repo: https://hg.mozilla.org/mozilla-central
    lando_repo: firefox-main
    access: scm_level_3
    trust_domain: gecko
    features+: [is-trunk]
    cron:
      targets:
        - nightly-all
        - nightly-android
        - nightly-desktop
        - nightly-desktop-linux
        - nightly-desktop-osx
        - nightly-desktop-win32
        - nightly-desktop-win64
        - nightly-desktop-win64-aarch64
        - periodic-update
        - pinning-update
        - system-symbols
        - l10n-cross-channel
        - os-integration
        - target: scriptworker-canary
          allow-input: true

  comm-central:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/comm-central
    access: scm_level_3
    trust_domain: comm
    parent_repo: https://hg.mozilla.org/mozilla-central
    features+: [is-trunk]
    cron:
      targets: [l10n-bumper, nightly-desktop, tb-rust-vendor-check]

  cedar:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/projects/cedar
    access: scm_level_2
    trust_domain: gecko
    cron:
      targets: [nightly-desktop, nightly-desktop-osx, nightly-desktop-win64]

  birch:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/projects/birch
    access: scm_level_2
    trust_domain: gecko
    cron:
      targets: [nightly-desktop]

  cypress:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/projects/cypress
    access: scm_level_3
    trust_domain: gecko
    cron:
      targets: [nightly-desktop, nightly-desktop-linux, nightly-desktop-osx,
                nightly-desktop-win32, nightly-desktop-win64, nightly-desktop-win64-aarch64]

  try:
    defaults: gecko-hg
    repo: https://hg.mozilla.org/try
    lando_repo: ff-test-dev
    access: scm_level_1
    trust_domain: gecko
    is_try: true
    branches: ["*"]
    features+:
      lando: true
      merge-automation: true
      shipit: true
      taskgraph-cron: false

  try-comm-central:
    defaults: gecko-hg
    repo: https://hg.mozilla.org/try-comm-central
    access: scm_level_1
    trust_domain: comm
    is_try: true
    features+:
      taskgraph-cron: false
      shipit: true

  larch:
    defaults: gecko-hg
    repo: https://hg.mozilla.org/projects/larch
    access: scm_level_2
    trust_domain: gecko
    features+:
      taskgraph-cron: false

  maple:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/projects/maple
    access: scm_level_3
    trust_domain: gecko
    cron:
      targets: [nightly-desktop]

  jamun:
    defaults: gecko-hg
    repo: https://hg.mozilla.org/projects/jamun
    access: scm_level_2
    trust_domain: comm
    features+:
      taskgraph-cron: false

  autoland:
    defaults: gecko-hg-cron
    repo: https://hg.mozilla.org/integration/autoland
    lando_repo: firefox-autoland
    access: scm_level_3
    trust_domain: gecko
    features+: [is-trunk, lando]
    cron:
      targets: [android-l10n-import, l10n-bumper, perftest-on-autoland]

  holly:
    defaults: gecko-hg
    repo: https://hg.mozilla.org/projects/holly
    access: scm_level_2
    trust_domain: gecko
    features+:
      taskgraph-cron: false

  # ===== Git projects =====

  firefox:
    defaults: firefox-git-full
    repo: https://github.com/mozilla-firefox/firefox
    branches: [autoland@3, main@3, beta@3, release@3, "esr*@3", "FIREFOX_ESR_*@3"]
    features+:
      taskgraph-cron: false

  firefox-prototypes:
    defaults: firefox-git
    repo: https://github.com/Firefox-AI/firefox-prototypes
    branches: [main@1, smart-window@1]

  enterprise-firefox:
    defaults: firefox-git-full
    repo: https://github.com/mozilla/enterprise-firefox
    default_branch: enterprise-main
    trust_domain: enterprise
    branches: [enterprise-main@3, enterprise-release@3, "*@1"]
    features+: [taskgraph-cron]

  enterprise-firefox-try:
    defaults: firefox-git-full
    repo: https://github.com/mozilla/enterprise-firefox-try
    default_branch: enterprise-main
    trust_domain: enterprise
    branches: ["*@1"]

  staging-firefox:
    defaults: firefox-git
    repo: https://github.com/mozilla-releng/staging-firefox
    trust_project: staging
    branches: [main@1, enterprise-main@1, tc-github@1]
    features+: [taskgraph-cron]

  # --- Non-gecko hg repos ---

  nss:
    defaults: nss-hg
    repo: https://hg.mozilla.org/projects/nss
    access: scm_nss

  nss-try:
    defaults: nss-hg
    repo: https://hg.mozilla.org/projects/nss-try
    access: scm_level_1
    is_try: true

  # --- Releng git repos ---

  fxci-config:
    defaults: git-taskgraph-restricted
    repo: https://github.com/mozilla-releng/fxci-config
    trust_domain: releng
    branches: [main@3]
    features+: [pr-actions, taskgraph-cron]
    cron:
      targets: [test-build-decision]

  taskgraph:
    defaults: git-taskgraph-restricted
    repo: https://github.com/taskcluster/taskgraph
    trust_domain: taskgraph
    branches: [main@3]
    features+: [pr-actions, treeherder-reporting]

  mozilla-taskgraph:
    defaults: git-taskgraph-restricted
    repo: https://github.com/mozilla-releng/mozilla-taskgraph
    trust_domain: taskgraph
    trust_project: mozilla-taskgraph
    branches: [main@3]

  reps:
    defaults: git-taskgraph-restricted
    repo: https://github.com/mozilla-releng/reps
    trust_domain: mozilla
    trust_project: reps
    branches: [main@1]

  redo:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla-releng/redo
    trust_domain: mozilla
    trust_project: redo
    default_branch: main
    branches: [main@1]

  simple-github:
    defaults: git-taskgraph-restricted
    repo: https://github.com/mozilla-releng/simple-github
    trust_domain: mozilla
    trust_project: simple-github
    branches: [main@1]

  # --- Mobile repos ---

  reference-browser:
    defaults: reference-browser-git
    repo: https://github.com/mozilla-mobile/reference-browser
    trust_domain: mobile
    trust_project: reference-browser
    branches: [master@3]
    cron:
      targets: [bump-android-comp, nightly]

  staging-reference-browser:
    defaults: reference-browser-git
    repo: https://github.com/mozilla-releng/staging-reference-browser
    trust_domain: mobile
    trust_project: reference-browser
    branches: [master@1]
    cron:
      targets: [bump-android-comp, nightly]

  firefox-ios:
    defaults: firefox-ios-git
    repo: https://github.com/mozilla-mobile/firefox-ios
    trust_domain: mobile
    trust_project: firefox-ios
    branches: [main@3, "release/*@3"]
    cron:
      targets: [l10-screenshots, beta-releases, bitrise-performance-test, firebase-performance-test]

  staging-firefox-ios:
    defaults: firefox-ios-git
    repo: https://github.com/mozilla-mobile/staging-firefox-ios
    trust_domain: mobile
    trust_project: firefox-ios
    branches: [main@1, "release/*@1"]
    cron:
      targets: [beta-releases]

  # --- mozilla org repos ---

  application-services:
    defaults: app-services-git
    repo: https://github.com/mozilla/application-services
    trust_domain: app-services
    branches: [main@3, "release-*@3"]
    cron:
      targets: [nightly]

  staging-application-services:
    defaults: app-services-git
    repo: https://github.com/mozilla-releng/staging-application-services
    trust_domain: app-services
    branches: [main@1, "release-*@1"]
    cron:
      targets: [nightly]

  glean:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla/glean
    trust_domain: glean
    trust_project: glean
    branches: [main@3]
    features+: [scriptworker, beetmover]

  k8s-autoscale:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla-releng/k8s-autoscale
    trust_domain: releng
    trust_project: k8s-autoscale
    default_branch: main
    branches: [main@3, production@3, dev@3]

  product-details:
    repo: https://github.com/mozilla-releng/product-details
    repo_type: git
    trust_domain: releng
    branches: [main@1, testing@1, production@3, staging@3]
    features:
      github-pull-request:
        policy: collaborators
      taskgraph-actions: true

  shipit:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla-releng/shipit
    trust_domain: releng
    branches: [main@3, production@3, dev@3]

  tooltool:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla-releng/tooltool
    trust_domain: releng
    trust_project: tooltool
    default_branch: master
    branches: [master@3, production@3, staging@3, dev@3]

  balrog:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla-releng/balrog
    trust_domain: releng
    branches: [main@3]

  scriptworker:
    defaults: git-taskgraph-restricted
    repo: https://github.com/mozilla-releng/scriptworker
    trust_domain: scriptworker
    branches: [main@3]

  winsign:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla-releng/winsign
    trust_domain: releng
    branches: [main@1]

  mozilla-version:
    repo: https://github.com/mozilla-releng/mozilla-version
    repo_type: git
    trust_domain: releng
    branches: [main@1]
    features:
      github-pull-request:
        policy: public
      taskgraph-actions: true

  build-mar:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla-releng/build-mar
    trust_domain: releng
    trust_project: build-mar
    default_branch: master
    branches: [master@1]

  firefox-ci-playground:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla-releng/firefox-ci-playground
    trust_domain: mozilla
    trust_project: firefox-ci-playground
    branches: [main@1]

  firefox-ci-playground-private:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla-releng/firefox-ci-playground-private
    trust_domain: mozilla
    trust_project: firefox-ci-playground
    branches: [main@1]
    features+: [github-private-repo]

  worker-images:
    defaults: git-taskgraph-restricted
    repo: https://github.com/mozilla-platform-ops/worker-images
    trust_domain: relops
    trust_project: worker-images
    branches: [main@3]
    features+: [pr-actions, taskgraph-cron]
    cron:
      targets:
        - target: run-integration-tests
          allow-input: true

  # --- VPN repos ---

  mozilla-vpn-client:
    defaults: vpn-git
    repo: https://github.com/mozilla-mobile/mozilla-vpn-client
    trust_domain: mozillavpn
    branches: [main@3, "releases/*@3"]

  staging-mozilla-vpn-client:
    defaults: vpn-git
    repo: https://github.com/mozilla-releng/staging-mozilla-vpn-client
    trust_domain: mozillavpn
    branches: [main@1, "releases/*@1"]

  # --- XPI repos ---

  xpi-manifest:
    defaults: xpi-manifest-git
    repo: https://github.com/mozilla-extensions/xpi-manifest
    trust_domain: xpi
    branches: [main@3]

  staging-xpi-manifest:
    defaults: xpi-manifest-git
    repo: https://github.com/mozilla-releng/staging-xpi-manifest
    trust_domain: xpi
    branches: ["*@1"]

  staging-xpi-public:
    repo: https://github.com/mozilla-releng/staging-xpi-public
    repo_type: git
    trust_domain: xpi
    branches: ["*@1"]
    features:
      github-pull-request:
        policy: public
      trust-domain-scopes: true
      xpi-roles: true

  staging-xpi-private:
    repo: https://github.com/mozilla-releng/staging-xpi-private
    repo_type: git
    default_branch: master
    trust_domain: xpi
    branches: ["*@1"]
    features:
      github-private-repo: true
      github-pull-request:
        policy: collaborators
      trust-domain-scopes: true
      xpi-roles: true

  # --- Adhoc signing ---

  staging-adhoc-signing:
    defaults: adhoc-git
    repo: https://github.com/mozilla-releng/staging-adhoc-signing
    trust_domain: adhoc
    default_branch: master
    branches: ["*@1"]

  adhoc-signing:
    defaults: adhoc-git
    repo: https://github.com/mozilla-releng/adhoc-signing
    trust_domain: adhoc
    branches: [main@3]

  # --- Code analysis ---

  code-review:
    defaults: code-analysis-git
    repo: https://github.com/mozilla/code-review
    trust_domain: code-analysis
    default_branch: master
    branches: [production@3, master@3, testing@3]

  scriptworker-scripts:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla-releng/scriptworker-scripts
    trust_domain: scriptworker
    default_branch: master
    branches: [master@3, "production*@3", "dev*@3"]

  code-coverage:
    defaults: code-analysis-git
    repo: https://github.com/mozilla/code-coverage
    trust_domain: code-analysis
    default_branch: master
    branches: [production@3, master@3, testing@3]

  # --- Translations ---

  translations:
    defaults: translations-git
    repo: https://github.com/mozilla/translations
    trust_domain: translations
    branches: [main@1, "release*@1", "dev*@1"]
    features+: [scriptworker]
    cron:
      notify_emails: []
      targets: [run-pipeline, update-db]

  staging-firefox-translations-training:
    defaults: translations-git
    repo: https://github.com/mozilla-releng/staging-firefox-translations-training
    trust_domain: translations
    branches: [main@1]
    cron:
      notify_emails: []
      targets: [run-pipeline]

  # --- Misc mozilla repos ---

  fx-desktop-qa-automation:
    defaults: git-taskgraph-public
    repo: https://github.com/mozilla/fx-desktop-qa-automation
    trust_domain: mozilla
    trust_project: fx-desktop-qa-automation
    branches: [main@3]
    features+: [taskgraph-cron]

  process-top-crashes:
    defaults: git-taskgraph-restricted
    repo: https://github.com/afranchuk/process-top-crashes
    trust_domain: mozilla
    trust_project: process-top-crashes
    branches: [main@1]
    features+: [taskgraph-cron]

  crash-ping-ingest:
    defaults: git-taskgraph-restricted
    repo: https://github.com/mozilla/crash-ping-ingest
    trust_domain: mozilla
    trust_project: crash-ping-ingest
    branches: [main@1]
    features+: [taskgraph-cron]

  # --- Org-wide wildcard repos ---

  mozilla:
    defaults: git-taskgraph-restricted
    repo: https://github.com/mozilla/*
    trust_domain: mozilla
    branches: [main@1]

  mozilla-releng:
    defaults: git-taskgraph-restricted
    repo: https://github.com/mozilla-releng/*
    trust_domain: mozilla
    branches: [main@1]
