---
# Compressed client definitions for fxci-config.
# expand/clients.py expands these into 249 Client resources.


# ============================================================
# Autophone / device clients
# ============================================================
# Each device gets 6 scopes: 4 base scopes + claim-work + worker-id.
# Bitbar devices: queue = proj-autophone/{queue}, worker-id = bitbar/*
# Lambda devices: queue = proj-autophone/{queue}, worker-id = lambda/*

autophone-clients:
  bitbar:
    base-scopes:
      - auth:sentry:tc-worker-script
      - auth:statsum:tc-worker-script
      - auth:webhooktunnel
      - auth:websocktunnel-token:firefoxcitc/bitbar.*
    worker-id-prefix: bitbar
    devices:
      - name: bitbar-x-test-1
        queue: gecko-t-bitbar-gw-test-1
        description: "Bitbar client for testing new docker images and other changes. Should only be used by RelOps."
      - name: bitbar-x-test-2
        queue: gecko-t-bitbar-gw-test-2
        description: "Bitbar client for testing new docker images and other changes. Should only be used by RelOps."
      - name: bitbar-x-test-3
        queue: gecko-t-bitbar-gw-test-3
        description: "Bitbar client for testing new docker images and other changes. Should only be used by RelOps."
      - name: bitbar-x-test-g5
        queue: gecko-t-bitbar-gw-test-g5
        description: "Bitbar client for testing new docker images and other changes. Should only be used by RelOps."
      - name: gecko-t-bitbar-batt-g5
        queue: gecko-t-bitbar-gw-batt-g5
      - name: gecko-t-bitbar-batt-p2
        queue: gecko-t-bitbar-gw-batt-p2
      - name: gecko-t-bitbar-perf-a51
        queue: gecko-t-bitbar-gw-perf-a51
        description: "Bitbar Samsung Galaxy A51 Phones - Perf Pool"
      - name: gecko-t-bitbar-perf-a55
        queue: gecko-t-bitbar-gw-perf-a55
        description: "Bitbar Samsung Galaxy A55 Phones - Perf Pool"
      - name: gecko-t-bitbar-perf-g5
        queue: gecko-t-bitbar-gw-perf-g5
      - name: gecko-t-bitbar-perf-p2
        queue: gecko-t-bitbar-gw-perf-p2
      - name: gecko-t-bitbar-perf-p5
        queue: gecko-t-bitbar-gw-perf-p5
        description: "Bitbar Google Pixel 5 Phones - Perf Pool"
      - name: gecko-t-bitbar-perf-p6
        queue: gecko-t-bitbar-gw-perf-p6
        description: "Bitbar Google Pixel 6 Phones - Perf Pool"
      - name: gecko-t-bitbar-perf-s21
        queue: gecko-t-bitbar-gw-perf-s21
        description: "Bitbar Samsung Galaxy S21 Phones - Perf Pool"
      - name: gecko-t-bitbar-perf-s24
        queue: gecko-t-bitbar-gw-perf-s24
        description: "Bitbar Samsung Galaxy S24 Phones - Perf Pool"
      - name: gecko-t-bitbar-perf-s7
        queue: gecko-t-bitbar-gw-perf-s7
        description: "Bitbar Samsung S7 Galaxy Phones - Perf Pool"
      - name: gecko-t-bitbar-unit-a51
        queue: gecko-t-bitbar-gw-unit-a51
        description: "Bitbar Samsung Galaxy A51 Phones - Unit Pool"
      - name: gecko-t-bitbar-unit-a55
        queue: gecko-t-bitbar-gw-unit-a55
        description: "Bitbar Samsung Galaxy A55 Phones - Unit Pool"
      - name: gecko-t-bitbar-unit-g5
        queue: gecko-t-bitbar-gw-unit-g5
      - name: gecko-t-bitbar-unit-p2
        queue: gecko-t-bitbar-gw-unit-p2
      - name: gecko-t-bitbar-unit-p5
        queue: gecko-t-bitbar-gw-unit-p5
        description: "Bitbar Google Pixel 5 Phones - Unit Pool"
      - name: gecko-t-bitbar-unit-p6
        queue: gecko-t-bitbar-gw-unit-p6
        description: "Bitbar Google Pixel 6 Phones - Unit Pool"
      - name: gecko-t-bitbar-unit-s21
        queue: gecko-t-bitbar-gw-unit-s21
        description: "Bitbar Samsung Galaxy S21 Phones - Unit Pool"
      - name: gecko-t-bitbar-unit-s24
        queue: gecko-t-bitbar-gw-unit-s24
        description: "Bitbar Samsung Galaxy S24 Phones - Unit Pool"
      - name: gecko-t-bitbar-unit-s7
        queue: gecko-t-bitbar-gw-unit-s7
        description: "Bitbar Samsung S7 Galaxy Phones - Unit Pool"

  lambda:
    base-scopes:
      - auth:sentry:tc-worker-script
      - auth:statsum:tc-worker-script
      - auth:webhooktunnel
      - auth:websocktunnel-token:firefoxcitc/lambda.*
    worker-id-prefix: lambda
    devices:
      - name: gecko-t-lambda-alpha-a55
        queue: gecko-t-lambda-alpha-a55
        description: "Lambdatest pool for configuration testing on a55"
      - name: gecko-t-lambda-perf-a55
        queue: gecko-t-lambda-perf-a55
        description: "Lambdatest pool for performance testing on a55"
      - name: gecko-t-lambda-perf-p9
        queue: gecko-t-lambda-perf-p9
        description: "Lambdatest pool for performance testing on pixel9"
      - name: gecko-t-lambda-stab
        queue: gecko-t-lambda-stab
        description: "Lambdatest pool for stability testing of outlier quarantined devices"


# ============================================================
# YAML anchors for repeated scope blocks
# ============================================================

_shipit_gecko_scopes: &shipit-gecko-scopes
  - project:releng:services/shipit_api/add_release/devedition
  - project:releng:services/shipit_api/add_release/firefox
  - project:releng:services/shipit_api/add_release/firefox-android
  - project:releng:services/shipit_api/mark_merge_automation_completed/firefox
  - project:releng:services/shipit_api/rebuild_product_details
  - project:releng:services/shipit_api/schedule_phase/devedition/ship_devedition
  - project:releng:services/shipit_api/schedule_phase/firefox-android/promote_android
  - project:releng:services/shipit_api/schedule_phase/firefox-android/ship_android
  - project:releng:services/shipit_api/schedule_phase/firefox/ship_firefox
  - project:releng:services/shipit_api/update_product_channel_version/firefox
  - project:releng:services/shipit_api/update_release_status

_shipit_mobile_scopes: &shipit-mobile-scopes
  - project:releng:services/shipit_api/add_release/firefox-ios
  - project:releng:services/shipit_api/mark_merge_automation_completed/firefox-ios
  - project:releng:services/shipit_api/schedule_phase/firefox-ios/promote
  - project:releng:services/shipit_api/schedule_phase/firefox-ios/push
  - project:releng:services/shipit_api/schedule_phase/firefox-ios/ship
  - project:releng:services/shipit_api/update_release_status

_shipit_comm_scopes: &shipit-comm-scopes
  - project:releng:services/shipit_api/rebuild_product_details
  - project:releng:services/shipit_api/update_product_channel_version/thunderbird
  - project:releng:services/shipit_api/update_release_status

_sheriff_backfill_scopes: &sheriff-backfill-scopes
  - hooks:trigger-hook:project-gecko/in-tree-action-1-backfill/*
  - hooks:trigger-hook:project-gecko/in-tree-action-1-generic/*
  - hooks:trigger-hook:project-gecko/in-tree-action-2-backfill/*
  - hooks:trigger-hook:project-gecko/in-tree-action-2-generic/*
  - hooks:trigger-hook:project-gecko/in-tree-action-3-backfill/*
  - hooks:trigger-hook:project-gecko/in-tree-action-3-generic/*


# ============================================================
# Scriptworker k8s clients (standard pattern)
# ============================================================
# Client ID: project/releng/scriptworker/v2/{function}/{env}/firefoxci-{pool-group}
# Standard scopes per client:
#   queue:claim-work:scriptworker-k8s/{pool-group}-{function}[-dev]
#   queue:worker-id:{pool-group}-{function}[-dev]/{pool-group}-{function}[-dev]-*
# Some clients have additional extra-scopes listed inline.

scriptworker-k8s-clients:
  addon:
    dev: [gecko-1]
    prod: [gecko-1, gecko-3]
  balrog:
    dev:
      - gecko-1
      - pool-group: xpi-1
        extra-scopes: [queue:get-artifact:xpi/*]
    prod:
      - comm-1
      - comm-3
      - gecko-1
      - gecko-3
      - pool-group: xpi-1
        extra-scopes: [queue:get-artifact:xpi/*]
      - pool-group: xpi-3
        extra-scopes: [queue:get-artifact:xpi/*]
  beetmover:
    dev:
      - pool-group: app-services-1
        description: "app-services level 1 nonprod beetmover scriptworker"
      - pool-group: gecko-1
        extra-scopes: [queue:get-artifact:releng/partner/*]
      - pool-group: glean-1
        description: "glean level 1 nonprod beetmover scriptworker"
      - mobile-1
      - pool-group: mozillavpn-1
        description: "mozillavpn level 1 nonprod beetmover scriptworker"
        extra-scopes: [queue:get-artifact:mozillavpn/*]
      - pool-group: translations-1
        description: "translations level 1 nonprod beetmover scriptworker"
      - pool-group: xpi-1
        description: "xpi level 1 nonprod beetmover scriptworker"
        extra-scopes: [queue:get-artifact:xpi/*]
    prod:
      - pool-group: app-services-1
        description: "app-services level 1 beetmover scriptworker"
      - pool-group: app-services-3
        description: "app-services level 3 beetmover scriptworker"
      - comm-1
      - comm-3
      - pool-group: gecko-1
        extra-scopes: [queue:get-artifact:releng/partner/*]
      - pool-group: gecko-3
        extra-scopes: [queue:get-artifact:releng/*]
      - pool-group: glean-1
        description: "glean level 1 beetmover scriptworker"
      - pool-group: glean-3
        description: "glean level 3 beetmover scriptworker"
      - mobile-1
      - mobile-3
      - pool-group: mozillavpn-1
        description: "mozillavpn level 1 beetmover scriptworker"
        extra-scopes: [queue:get-artifact:mozillavpn/*]
      - pool-group: mozillavpn-3
        description: "mozillavpn level 3 beetmover scriptworker"
        extra-scopes: [queue:get-artifact:mozillavpn/*]
      - pool-group: translations-1
        description: "translations level 1 beetmover scriptworker"
      - pool-group: translations-3
        description: "translations level 3 beetmover scriptworker"
      - pool-group: xpi-1
        description: "xpi level 1 beetmover scriptworker"
        extra-scopes: [queue:get-artifact:xpi/*]
      - pool-group: xpi-3
        description: "xpi level 3 beetmover scriptworker"
        extra-scopes: [queue:get-artifact:xpi/*]
  bitrise:
    dev:
      - pool-group: mobile-1
        description: "mobile level 1 nonprod bitrise scriptworker"
    prod:
      - pool-group: mobile-1
        description: "mobile level 1 bitrise scriptworker"
      - pool-group: mobile-3
        description: "mobile level 3 bitrise scriptworker"
  bouncer:
    dev: [gecko-1]
    prod: [comm-1, comm-3, gecko-1, gecko-3]
  github:
    dev:
      - mobile-1
      - pool-group: xpi-1
        extra-scopes: [queue:get-artifact:xpi/*]
    prod:
      - mobile-1
      - mobile-3
      - pool-group: xpi-1
        extra-scopes: [queue:get-artifact:xpi/*]
      - pool-group: xpi-3
        extra-scopes: [queue:get-artifact:xpi/*]
  lando:
    dev:
      - pool-group: gecko-1
        description: "gecko level 1 nonprod lando scriptworker"
    prod:
      - pool-group: gecko-1
        description: "gecko level 1 lando scriptworker"
      - pool-group: gecko-3
        description: "gecko level 3 lando scriptworker"
  pushapk:
    dev: [gecko-1, mozillavpn-1]
    prod: [gecko-1, gecko-3, mobile-1, mobile-3, mozillavpn-1, mozillavpn-3]
  pushflatpak:
    dev: [comm-1, gecko-1]
    prod: [comm-1, comm-3, gecko-1, gecko-3]
  pushmsix:
    dev: [comm-1, gecko-1]
    prod: [comm-1, comm-3, gecko-1, gecko-3]
  signing:
    dev:
      - pool-group: adhoc-t
        description: "Adhoc signing dev signing scriptworker client"
        extra-scopes: [queue:get-artifact:private/openh264/*, queue:get-artifact:releng/adhoc/*]
      - pool-group: enterprise-t
        extra-scopes: [queue:get-artifact:project/enterprise/*]
      - pool-group: gecko-t
        extra-scopes: [queue:get-artifact:private/openh264/*, queue:get-artifact:releng/partner/*]
      - pool-group: mobile-t
        description: "dev mobile signing"
      - pool-group: xpi-t
        description: "dev xpi signing"
        extra-scopes: [queue:get-artifact:xpi/*]
    prod:
      - pool-group: adhoc-3
        extra-scopes: [queue:get-artifact:private/openh264/*, queue:get-artifact:releng/adhoc/*]
      - pool-group: adhoc-t
        extra-scopes: [queue:get-artifact:private/openh264/*, queue:get-artifact:releng/adhoc/*]
      - app-services-3
      - app-services-t
      - comm-3
      - comm-t
      - pool-group: enterprise-3
        extra-scopes: [queue:get-artifact:project/enterprise/*]
      - pool-group: enterprise-t
        extra-scopes: [queue:get-artifact:project/enterprise/*]
      - pool-group: gecko-3
        extra-scopes: [queue:get-artifact:private/openh264/*, queue:get-artifact:releng/*]
      - pool-group: gecko-t
        extra-scopes: [queue:get-artifact:private/openh264/*, queue:get-artifact:releng/partner/*]
      - glean-3
      - glean-t
      - mobile-3
      - mobile-t
      - pool-group: xpi-3
        description: "production xpi signing"
        extra-scopes: [queue:get-artifact:xpi/*]
      - pool-group: xpi-t
        description: "dep xpi signing"
        extra-scopes: [queue:get-artifact:xpi/*]
  shipit:
    dev:
      - pool-group: app-services-1
        description: "app-services level 1 nonprod shipit scriptworker"
        extra-scopes: [project:releng:services/shipit_api/update_release_status]
      - pool-group: comm-1
        description: "comm level 1 nonprod shipit scriptworker"
        extra-scopes: [project:releng:services/shipit_api/update_release_status]
      - pool-group: gecko-1
        description: "gecko level 1 nonprod shipit scriptworker"
        extra-scopes: [*shipit-gecko-scopes]
      - pool-group: mobile-1
        description: "mobile level 1 nonprod shipit scriptworker"
        extra-scopes: [*shipit-mobile-scopes]
      - pool-group: mozillavpn-1
        description: "mozillavpn level 1 nonprod shipit scriptworker"
        extra-scopes: [project:releng:services/shipit_api/update_release_status]
      - pool-group: xpi-1
        description: "xpi level 1 nonprod shipit scriptworker"
        extra-scopes: [project:releng:services/shipit_api/update_release_status]
    prod:
      - pool-group: app-services-1
        description: "app-services level 1 shipit scriptworker"
        extra-scopes: [project:releng:services/shipit_api/update_release_status]
      - pool-group: app-services-3
        description: "app-services level 3 shipit scriptworker"
        extra-scopes: [project:releng:services/shipit_api/update_release_status]
      - pool-group: comm-1
        description: "comm level 1 shipit scriptworker"
        extra-scopes: [*shipit-comm-scopes]
      - pool-group: comm-3
        description: "comm level 3 shipit scriptworker"
        extra-scopes: [*shipit-comm-scopes]
      - pool-group: gecko-1
        description: "gecko level 1 shipit scriptworker"
        extra-scopes: [*shipit-gecko-scopes]
      - pool-group: gecko-3
        description: "gecko level 3 shipit scriptworker"
        extra-scopes: [*shipit-gecko-scopes]
      - pool-group: mobile-1
        description: "mobile level 1 shipit scriptworker"
        extra-scopes: [*shipit-mobile-scopes]
      - pool-group: mobile-3
        description: "mobile level 3 shipit scriptworker"
        extra-scopes: [*shipit-mobile-scopes]
      - pool-group: mozillavpn-1
        description: "mozillavpn level 1 shipit scriptworker"
        extra-scopes: [project:releng:services/shipit_api/update_release_status]
      - pool-group: mozillavpn-3
        description: "mozillavpn level 3 shipit scriptworker"
        extra-scopes: [project:releng:services/shipit_api/update_release_status]
      - pool-group: xpi-1
        description: "xpi level 1 shipit scriptworker"
        extra-scopes: [project:releng:services/shipit_api/update_release_status]
      - pool-group: xpi-3
        description: "xpi level 3 shipit scriptworker"
        extra-scopes: [project:releng:services/shipit_api/update_release_status]
  tree:
    dev: [comm-1, gecko-1, mobile-1]
    prod: [comm-1, comm-3, gecko-1, gecko-3, mobile-1, mobile-3]


# ============================================================
# Scriptworker clients with explicit scopes
# ============================================================

scriptworker-explicit-clients:
  project/releng/scriptworker/v2/cloudops-canary:
    description: "Allows cloudops' jenkins to trigger scriptworker canary tasks"
    scopes:
      - hooks:trigger-hook:project-releng/cron-task-mozilla-central/scriptworker-canary
  project/releng/scriptworker/v2/iscript/dep:
    description: ""
    scopes:
      - assume:worker-type:scriptworker-prov-v1/depsigning-mac-v1
      - queue:get-artifact:private/openh264/*
      - queue:get-artifact:releng/partner/*
      - queue:worker-id:signing-mac-v1/dep-mac-v3-signing*
  project/releng/scriptworker/v2/iscript/dev:
    description: ""
    scopes:
      - assume:worker-type:scriptworker-prov-v1/depsigning-mac-v1-dev
      - queue:get-artifact:private/openh264/*
      - queue:get-artifact:releng/partner/*
      - queue:worker-id:signing-mac-v1/dev-mac-v3-signing*
  project/releng/scriptworker/v2/iscript/prod:
    description: ""
    scopes:
      - assume:worker-type:scriptworker-prov-v1/signing-mac-v1
      - queue:get-artifact:private/openh264/*
      - queue:get-artifact:releng/partner/*
      - queue:worker-id:signing-mac-v1/mac-v3-signing*
  project/releng/scriptworker/v2/iscript/tb-dep:
    description: ""
    scopes:
      - assume:worker-type:scriptworker-prov-v1/tb-depsigning-mac-v1
      - queue:worker-id:signing-mac-v1/dep-mac-v3-signing*
  project/releng/scriptworker/v2/iscript/tb-prod:
    description: ""
    scopes:
      - assume:worker-type:scriptworker-prov-v1/tb-signing-mac-v1
      - queue:worker-id:signing-mac-v1/tb-mac-v3-signing*
  project/releng/scriptworker/v2/mac-signing/dev/firefoxci-adhoc-t:
    description: "Adhoc iscript dev scriptworker client"
    scopes:
      - queue:claim-work:scriptworker-prov-v1/adhoc-signing-mac-dev
      - queue:get-artifact:private/openh264/*
      - queue:get-artifact:releng/adhoc/*
      - queue:worker-id:adhoc-signing-mac-v1/dev-adhoc-mac-v3-signing*
  project/releng/scriptworker/v2/mac-signing/prod/firefoxci-adhoc-3:
    description: "Adhoc iscript production scriptworker client"
    scopes:
      - queue:claim-work:scriptworker-prov-v1/adhoc-3-signing-mac
      - queue:get-artifact:releng/adhoc/*
      - queue:worker-id:adhoc-signing-mac-v1/adhoc-mac-v3-signing*
  project/releng/scriptworker/v2/mac-signing/prod/firefoxci-adhoc-t:
    description: "Adhoc iscript production scriptworker client"
    scopes:
      - queue:claim-work:scriptworker-prov-v1/adhoc-t-signing-mac
      - queue:get-artifact:releng/adhoc/*
      - queue:worker-id:adhoc-depsigning-mac-v1/adhoc-mac-v3-depsigning*
  project/releng/scriptworker/v2/mac-signing/prod/firefoxci-mozillavpn-3:
    description: "mozillavpn mac signing"
    scopes:
      - assume:worker-type:scriptworker-prov-v1/mozillavpn-3-signing-mac
      - queue:worker-id:mozillavpn-3-signing-mac/vpn-mac-v3-signing*
  project/releng/scriptworker/v2/mac-signing/prod/firefoxci-mozillavpn-t:
    description: "mozillavpn mac dep signing"
    scopes:
      - assume:worker-type:scriptworker-prov-v1/mozillavpn-t-signing-mac
      - assume:worker-type:scriptworker-prov-v1/vpn-depsigning-mac-v1
      - queue:worker-id:mozillavpn-t-signing-mac/vpn-mac-v3-signing*
      - queue:worker-id:vpn-depsigning-mac-v1/dep-mac-v3-signing*
  project/releng/scriptworker/v2/notarization-poller/prod:
    description: "Mac notarization poller client."
    scopes:
      - assume:worker-type:scriptworker-prov-v1/mac-notarization-poller
      - queue:get-artifact:releng/partner/*
  project/releng/scriptworker/v2/notarization-poller/tb-prod:
    description: ""
    scopes:
      - assume:worker-type:scriptworker-prov-v1/tb-mac-notarization-poller
      - queue:get-artifact:releng/partner/*
  # mozillavpn signing clients have non-standard worker-id patterns (no dash before *)
  project/releng/scriptworker/v2/signing/dev/firefoxci-mozillavpn-t:
    description: "mozillavpn linux signing"
    scopes:
      - queue:claim-work:scriptworker-k8s/mozillavpn-t-signing-dev
      - queue:worker-id:mozillavpn-t-signing-dev/mozillavpn-t-signing-dev*
  project/releng/scriptworker/v2/signing/prod/firefoxci-mozillavpn-3:
    description: "mozillavpn linux signing"
    scopes:
      - queue:claim-work:scriptworker-k8s/mozillavpn-3-signing
      - queue:worker-id:mozillavpn-3-signing/mozillavpn-3-signing*
  project/releng/scriptworker/v2/signing/prod/firefoxci-mozillavpn-t:
    description: "mozillavpn linux signing"
    scopes:
      - queue:claim-work:scriptworker-k8s/mozillavpn-t-signing
      - queue:worker-id:mozillavpn-t-signing/mozillavpn-t-signing*
  project/releng/scriptworker/v2/xpi-3-signing:
    description: ""
    scopes:
      - queue:claim-work:scriptworker-prov-v1/xpi-3-signing
      - queue:get-artifact:xpi/*
      - queue:worker-id:signing-linux-v1/signing-linux-*
  project/releng/scriptworker/v2/xpi-t-signing:
    description: ""
    scopes:
      - project:xpi:releng:signing:cert:dep-signing
      - queue:claim-work:scriptworker-prov-v1/xpi-t-signing
      - queue:get-artifact:xpi/*
      - queue:worker-id:signing-linux-v1/depsigning-worker*


# ============================================================
# v3 mac-signing clients (pattern-based)
# ============================================================
# Client ID: project/releng/scriptworker/v3/mac-signing/prod/firefoxci-{pool-group}
# Pool-group suffix determines worker-type:
#   -3 (prod):  {product}-signing-mac14m2
#   -t (dep):   dep-{product}-signing-mac14m2

v3-mac-signing-clients:
  adhoc-3:
    description: "Production signing worker pool for Adhoc on macOS 14 (M2). Handles macOS-specific signing tasks."
  adhoc-t:
    description: "Dep signing worker pool for Adhoc on macOS 14 (M2). Handles macOS-specific signing tasks."
  comm-3:
    description: "Production signing worker pool for Thunderbird on macOS 14 (M2). Handles macOS-specific signing tasks."
  comm-t:
    description: "Dep signing worker pool for Thunderbird on macOS 14 (M2). Handles macOS-specific signing tasks."
  enterprise-3:
    description: "Production signing worker pool for Enterprise Firefox on macOS 14 (M2). Handles macOS-specific signing tasks."
    extra-scopes: [queue:get-artifact:project/enterprise/repacks/*]
  enterprise-t:
    description: "Dep signing worker pool for Enterprise Firefox on macOS 14 (M2). Handles macOS-specific signing tasks."
    extra-scopes: [queue:get-artifact:project/enterprise/repacks/*]
  gecko-3:
    description: "Production signing worker pool for Firefox on macOS 14 (M2). Handles macOS-specific signing tasks."
