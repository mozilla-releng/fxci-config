# Compressed worker-pools configuration.
# Expanded by expand/worker_pools.py into full pool definitions for ciadmin.

defaults:
  owner: release+tc-workers@mozilla.com
  email_on_error: true
  regions: &default-gcp-regions [us-central1, us-west1]
  lifecycle:
    registrationTimeout: 1800
    reregistrationTimeout: 345600
    queueInactivityTimeout: 7200

worker-defaults-passthrough:
  lifecycle:
    queueInactivityTimeout:
      by-provider:
        azure.*: 14400
        default: 7200
    registrationTimeout: 1800
    reregistrationTimeout: 345600
  worker-config:
    by-implementation:
      docker-worker:
        shutdown:
          enabled: true
          afterIdleSeconds: 120
        deviceManagement:
          hostSharedMemory:
            enabled: false
          kvm:
            enabled: false
        artifacts:
          skipCompressionExtensions: [.7z, .bz2, .deb, .dmg, .flv, .gif, .gz, .jpeg, .jpg, .png, .swf, .tbz, .tgz, .webp, .whl, .woff, .woff2, .xz, .zip, .zst, lz4]
      generic-worker/windows:
        genericWorker:
          config: &gw-windows-config
            cachesDir: 'Z:\caches'
            cleanUpTaskDirs: true
            disableReboots: false
            disableOOMProtection: true
            downloadsDir: 'Z:\downloads'
            livelogExecutable: 'C:\generic-worker\livelog.exe'
            ed25519SigningKeyLocation: 'C:\generic-worker\ed25519-private.key'
            enableRunTaskAsCurrentUser: false
            idleTimeoutSecs: 150
            numberOfTasksToRun: 0
            runAfterUserCreation: 'C:\generic-worker\task-user-init.cmd'
            sentryProject: generic-worker
            shutdownMachineOnIdle: true
            shutdownMachineOnInternalError: true
            taskclusterProxyExecutable: 'C:\generic-worker\taskcluster-proxy.exe'
            taskclusterProxyPort: 80
            tasksDir: 'Z:\'
            wstAudience: firefoxcitc
      generic-worker/windows-builder:
        genericWorker:
          config:
            <<: *gw-windows-config
            disableReboots: true
            headlessTasks: true
      generic-worker/worker-runner-windows:
        genericWorker:
          config:
            cachesDir: 'Z:\caches'
            cleanUpTaskDirs: true
            disableReboots: false
            downloadsDir: 'Z:\downloads'
            livelogExecutable: 'C:\generic-worker\livelog.exe'
            ed25519SigningKeyLocation: 'C:\generic-worker\ed25519-private.key'
            idleTimeoutSecs: 150
            numberOfTasksToRun: 0
            runAfterUserCreation: 'C:\generic-worker\task-user-init.cmd'
            runTasksAsCurrentUser: false
            sentryProject: generic-worker
            shutdownMachineOnIdle: true
            shutdownMachineOnInternalError: true
            taskclusterProxyExecutable: 'C:\generic-worker\taskcluster-proxy.exe'
            taskclusterProxyPort: 80
            tasksDir: 'Z:\'
            wstAudience: firefoxcitc
      generic-worker/worker-runner-linux:
        genericWorker:
          config:
            cachesDir: /home/ubuntu/caches
            cleanUpTaskDirs: true
            disableReboots: false
            downloadsDir: /home/ubuntu/downloads
            livelogExecutable: /home/ubuntu/generic_worker/livelog
            ed25519SigningKeyLocation: /home/ubuntu/generic_worker/ed25519-private.key
            idleTimeoutSecs: 300
            numberOfTasksToRun: 0
            sentryProject: generic-worker
            shutdownMachineOnIdle: true
            shutdownMachineOnInternalError: true
            taskclusterProxyExecutable: /home/ubuntu/generic_worker/taskcluster-proxy
            taskclusterProxyPort: 8081
            tasksDir: /home/ubuntu/tasks
            wstAudience: firefoxcitc
      generic-worker/worker-runner-linux-multi:
        genericWorker:
          config:
            cleanUpTaskDirs: true
            disableReboots: false
            ed25519SigningKeyLocation: /etc/taskcluster/secrets/gw_cot_private_key
            idleTimeoutSecs: 300
            livelogExecutable: /usr/local/bin/livelog
            numberOfTasksToRun: 0
            sentryProject: generic-worker
            shutdownMachineOnIdle: true
            shutdownMachineOnInternalError: true
            taskclusterProxyExecutable: /usr/local/bin/taskcluster-proxy
            taskclusterProxyPort: 80
            wstAudience: firefoxcitc
      generic-worker/linux:
        genericWorker:
          config: &gw-linux-config
            cachesDir: /home/generic-worker/caches
            cleanUpTaskDirs: true
            d2gConfig:
              enableD2G: false
            disableNativePayloads: false
            disableReboots: false
            downloadsDir: /home/generic-worker/downloads
            ed25519SigningKeyLocation: '/etc/generic-worker/ed25519_key'
            enableInteractive: true
            enableRunTaskAsCurrentUser: false
            headlessTasks: false
            idleTimeoutSecs: 300
            livelogExecutable: /usr/local/bin/livelog
            numberOfTasksToRun: 0
            requiredDiskSpaceMegabytes: 40960
            sentryProject: generic-worker
            shutdownMachineOnIdle: true
            shutdownMachineOnInternalError: true
            taskclusterProxyExecutable: /usr/local/bin/taskcluster-proxy
            taskclusterProxyPort: 80
            wstAudience: firefoxcitc
      generic-worker/linux-headless:
        genericWorker:
          config:
            <<: *gw-linux-config
            headlessTasks: true
      generic-worker/linux-d2g:
        genericWorker:
          config:
            <<: *gw-linux-config
            d2gConfig:
              enableD2G: true
              allowGPUs: false
              allowHostSharedMemory: false
              allowInteractive: true
              allowKVM: false
              allowLoopbackAudio: false
              allowLoopbackVideo: true
              allowPrivileged: false
            disableNativePayloads: true
            headlessTasks: true
      generic-worker/linux-d2g-trusted:
        genericWorker:
          config:
            <<: *gw-linux-config
            d2gConfig:
              enableD2G: true
              allowGPUs: false
              allowHostSharedMemory: false
              allowInteractive: false
              allowKVM: false
              allowLoopbackAudio: false
              allowLoopbackVideo: false
              allowPrivileged: false
            disableNativePayloads: true
            enableInteractive: false
            headlessTasks: true
            livelogExecutable: /bin/false

azure-shared:
  arm-template-untrusted: &arm-untrusted /subscriptions/108d46d5-fe9b-4850-9a7d-8c914aa6c1f0/resourceGroups/template-spec/providers/Microsoft.Resources/templateSpecs/taskcluster-arm-template/versions/1.0
  arm-template-trusted: &arm-trusted /subscriptions/a30e97ab-734a-4f3b-a0e4-c51c0bff0701/resourceGroups/template-spec/providers/Microsoft.Resources/templateSpecs/taskcluster-arm-template/versions/1.0
  arm-template-v6-nvme: &arm-v6-nvme /subscriptions/108d46d5-fe9b-4850-9a7d-8c914aa6c1f0/resourceGroups/template-spec/providers/Microsoft.Resources/templateSpecs/taskcluster-arm-template-v6-nvme/versions/1.0
  tags-ronin-windows: &tags-ronin-windows
    sourceScript: provisioners/windows/azure/azure-bootstrap.ps1
    sourceBranch: windows
    sourceRepository: ronin_puppet
    sourceOrganisation: mozilla-platform-ops
  tags-ronin-2022: &tags-ronin-2022
    sourceScript: provisioners/windows/azure/2022-azure-bootstrap.ps1
    sourceBranch: windows
    sourceRepository: ronin_puppet
    sourceOrganisation: mozilla-platform-ops
  tags-ronin-master: &tags-ronin-master
    sourceScript: provisioners/windows/azure/azure-bootstrap.ps1
    sourceBranch: master
    sourceRepository: ronin_puppet
    sourceOrganisation: mozilla-platform-ops
  weight-f8s: &weight-f8s
    by-location:
      central-india: 1
      west-us-3: 1
      north-central-us: 1
      south-india: 0.9
      central-us: 0.8
      north-europe: 0.7
      canada-central: 0.6
      west-us-2: 0.6
      east-us: 0.5
      west-us: 0.4
      east-us-2: 0.4
      default: 0.2
  weight-nv12ads: &weight-nv12ads
    by-location:
      east-us: 1
      west-us-2: 1
      west-us-3: 1
      east-us-2: 0.8
      default: 0.5
  weight-e8ads-v6: &weight-e8ads-v6
    by-location:
      central-india: 1
      default: 0.5
  weight-d16ps-builder: &weight-d16ps-builder
    by-location:
      central-india: 1
      east-us-2: 0.9
      north-central-us: 0.9
      central-us: 0.8
      default: 0.5
  weight-d16ps-tester: &weight-d16ps-tester
    by-location:
      central-india: 1
      uk-south: 0.9
      east-us-2: 0.8
      north-central-us: 0.7
      central-us: 0.6
      default: 0.5
  locs-tester-11region: &locs-11 [canada-central, central-india, east-us, east-us-2, west-us, west-us-2, west-us-3, north-central-us, central-us, north-europe, south-india]
  locs-tester-10region: &locs-10 [canada-central, east-us, east-us-2, west-us, west-us-2, west-us-3, north-central-us, central-us, north-europe, south-india]
  locs-ssd-6region: &locs-ssd [east-us, east-us-2, west-us, west-us-2, north-central-us, central-us]
  wm-tester-f8s-nv12: &wm-tester-f8s-nv12
    capacityPerInstance: 1
    initialWeight:
      by-vm_size:
        Standard_F8s_v2: *weight-f8s
        Standard_NV12ads_A10_v5: *weight-nv12ads
        default: 1
  wm-tester-f8s-nv12-e8v6: &wm-tester-f8s-nv12-e8v6
    capacityPerInstance: 1
    initialWeight:
      by-vm_size:
        Standard_F8s_v2: *weight-f8s
        Standard_NV12ads_A10_v5: *weight-nv12ads
        Standard_E8ads_v6: *weight-e8ads-v6
        default: 1
  wm-builder-d16ps: &wm-builder-d16ps
    capacityPerInstance: 1
    initialWeight:
      by-vm_size:
        Standard_D16ps_v5: *weight-d16ps-builder
        default: 1
  wm-tester-d16ps: &wm-tester-d16ps
    capacityPerInstance: 1
    initialWeight:
      by-vm_size:
        Standard_D16ps_v5: *weight-d16ps-tester
        default: 1
  suffixes-win11-tester: &suffixes-win11-tester
    '':
      groups: [gecko-t, comm-t, enterprise-t, taskgraph-t]
    privileged:
      groups: [gecko-t]
    unprivileged:
      groups: [gecko-t]
    privileged-alpha:
      groups: [gecko-t]
      implementation: generic-worker/windows
    unprivileged-alpha:
      groups: [gecko-t]
      implementation: generic-worker/windows
    alpha:
      groups: [gecko-t, enterprise-t]
      implementation: generic-worker/windows
    large:
      groups: [gecko-t]
    large-alpha:
      groups: [gecko-t]
      implementation: generic-worker/windows
    gpu:
      groups: [gecko-t]
    gpu-alpha:
      groups: [gecko-t]
    webgpu:
      groups: [gecko-t]
    webgpu-alpha:
      groups: [gecko-t]
      implementation: generic-worker/windows
    source:
      groups: [gecko-t, enterprise-t]
    source-alpha:
      groups: [gecko-t, enterprise-t]
      implementation: generic-worker/windows
    ssd:
      groups: [gecko-t, comm-t]
    ssd-gpu:
      groups: [gecko-t]
  maxcap-win11-tester: &maxcap-win11-tester
    by-trust-domain:
      comm:
        by-suffix:
          '': 600
          default: 50
      gecko:
        by-suffix:
          '': 1200
          alpha: 500
          gpu: 600
          default: 100
      enterprise: 50
      default: 5
  locs-win11-tester: &locs-win11-tester
    by-trust-domain:
      comm:
        by-suffix:
          ssd: *locs-ssd
          default: *locs-10
      default:
        by-suffix:
          '(source-)?alpha': [uk-south]
          '(webgpu|gpu)': [east-us, east-us-2, west-us, west-us-2]
          '.*gpu-alpha': [west-us, west-us-2]
          '(ssd|source)': *locs-ssd
          ssd-gpu: [north-europe, east-us, east-us-2]
          default: *locs-11

templates:
  gcp-docker-cot:
    provider: gcp
    implementation: docker-worker
    description: Worker for Firefox automation.
    provider_id:
      by-cot:
        trusted: fxci-level3-gcp
        default: fxci-level1-gcp
    image:
      by-cot:
        trusted: monopacker-docker-worker-trusted-current-gcp
        default: monopacker-docker-worker-current
    minCapacity: 0
    regions: *default-gcp-regions
  gcp-d2g-cot:
    provider: gcp
    implementation: generic-worker/linux-d2g-{chain-of-trust}
    description: Worker for Firefox automation.
    provider_id:
      by-cot:
        trusted: fxci-level3-gcp
        default: fxci-level1-gcp
    image: ubuntu-2404-headless
    minCapacity: 0
    regions: *default-gcp-regions
  gcp-tester:
    provider: gcp
    implementation: docker-worker
    description: Worker for gecko-based automation.
    provider_id: fxci-level1-gcp
    image: monopacker-docker-worker-gcp-current
    minCapacity: 0
    regions: *default-gcp-regions
  translations-d2g:
    provider: gcp
    implementation: generic-worker/linux-d2g
    provider_id:
      by-cot:
        trusted: fxci-level3-gcp
        default: fxci-level1-gcp
    image: ubuntu-2404-headless
    minCapacity: 0
    regions: *default-gcp-regions
    worker-config:
      genericWorker:
        config:
          maxTaskRunTime: 2592900
  translations-gpu:
    extends: translations-d2g
    worker-config:
      genericWorker:
        config:
          maxTaskRunTime: 2592900
          d2gConfig:
            allowGPUs: true

  azure-base:
    description: ''
    owner: relops-azure-provisioning@mozilla.com
    cloud: azure
    implementation: generic-worker/windows
    spot: true
  azure-win11-x64-tester:
    extends: azure-base
    provider_id: azure2
    groups: [gecko-t, enterprise-t, comm-t, taskgraph-t]
    locations: *locs-win11-tester
    suffixes: *suffixes-win11-tester
    maxCapacity: *maxcap-win11-tester
    disk_controller_type: SCSI
    armDeployment:
      templateSpecId: *arm-untrusted
    worker-purpose: '{pool-group}'
    worker-manager-config: *wm-tester-f8s-nv12-e8v6
    worker-config:
      genericWorker:
        config:
          workerType: '{pool-id-base}'
          provisionerId: gecko-t
          numberOfTasksToRun:
            by-suffix:
              privileged: 1
              privileged-alpha: 1
              default: 0
          cachesDir: 'D:\caches'
          downloadsDir: 'D:\downloads'
          tasksDir: 'D:\'
  azure-win11-a64-tester:
    extends: azure-base
    provider_id: azure2
    groups: [gecko-t, comm-t, nss-1, nss-t]
    locations: [central-india, east-us-2, north-central-us, central-us, uk-south]
    suffixes:
      '':
        groups: [gecko-t, comm-t, nss-1, nss-t]
      alpha:
        groups: [gecko-t, comm-t, nss-1, nss-t]
        implementation: generic-worker/windows
    maxCapacity:
      by-trust-domain:
        gecko: 500
        comm: 500
        default: 50
    vm_size: Standard_D8ps_v5
    worker-purpose: '{pool-group}'
    worker-manager-config: *wm-tester-d16ps
    worker-config:
      genericWorker:
        config:
          workerType: '{pool-id-base}'
          provisionerId: '{pool-group}'
          cachesDir: 'C:\caches'
          downloadsDir: 'C:\downloads'
          tasksDir: 'C:\'
  azure-win11-a64-builder:
    extends: azure-base
    provider_id:
      by-level:
        1: azure2
        3: azure_trusted
    groups: [gecko, enterprise, mozillavpn, nss]
    locations: [central-india, east-us-2, north-central-us, central-us]
    suffixes:
      '':
        groups: [gecko-1, gecko-3, enterprise-1, enterprise-3, mozillavpn-1, mozillavpn-3, nss-1, nss-3]
      alpha:
        groups: [gecko-1, nss-1]
        implementation: generic-worker/windows
    maxCapacity:
      by-trust-domain:
        nss: 25
        gecko: 250
        default: 10
    vm_size: Standard_D16ps_v5
    managed_disk: Premium_LRS
    armDeployment:
      by-level:
        1:
          templateSpecId: *arm-untrusted
        3:
          templateSpecId: *arm-trusted
    worker-purpose:
      by-trust-domain:
        mozillavpn:
          by-level:
            1: vpn-1
            3: vpn-3
        default:
    worker-manager-config: *wm-builder-d16ps
    worker-config:
      genericWorker:
        config:
          workerType: '{pool-id-base}'
          provisionerId: '{pool-group}'
          cachesDir: 'C:\caches'
          downloadsDir: 'C:\downloads'
          tasksDir: 'C:\'

