pools:
- pool_id: infra/build-decision
  description: Worker for firefox-ci automation.
  provider_id: fxci-level1-gcp
  image: monopacker-docker-worker-current
  machine: n2-standard-2-75gb-lssd
  capacityPerInstance: 8
  minCapacity: 1
  maxCapacity: 4
  worker-config:
    shutdown:
      afterIdleSeconds: 86400
- pool_id: b-linux
  template: gcp-d2g-cot
  groups: [gecko, comm, app-services, enterprise]
  machine: c2-standard-16-2lssd-60gb
  maxCapacity:
    by-trust-domain:
      gecko: 1000
      comm: 300
      app-services:
        by-level:
          1: 50
          3: 100
      default: 100
- pool_id: b-linux-gcp
  template: gcp-docker-cot
  groups: [gecko, comm, app-services]
  machine: c2-standard-16-2lssd-20gb
  maxCapacity:
    by-trust-domain:
      gecko: 1000
      comm: 300
      app-services:
        by-level:
          1: 50
          3: 100
      default: 100
- pool-table:
    description: Worker for Firefox automation.
    groups: [gecko-1]
    provider_id: fxci-level1-gcp
    machine: c2-standard-16-2lssd-20gb
    columns: [pool_id, image, maxCapacity, regions]
    rows:
    - [b-linux-gcp-relops1411, monopacker-docker-worker-2025-06-13-relops1411, 100, null]
    - - b-linux-gcp-test-bug-1882320
      - monopacker-docker-worker-current
      - 5
      - [northamerica-northeast1]
- pool-pair:
    regions: [us-central1, us-east1]
    maxCapacity:
      by-trust-domain:
        gecko: 1000
        comm: 300
        app-services:
          by-level:
            1: 50
            3: 100
        default: 100
    variants:
    - pool_id: 'b-linux-docker{suffix}-amd'
      template: gcp-d2g-cot
      suffixes:
        '':
          groups: [gecko, comm, app-services, enterprise]
